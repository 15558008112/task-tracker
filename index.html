<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>24H 交互助手</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Outfit', sans-serif; }
        body { background: #0a0a0f; min-height: 100vh; }
        .bg-grid {
            background-image: 
                linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 40px 40px;
        }
        .card {
            background: linear-gradient(135deg, rgba(255,255,255,0.03) 0%, rgba(255,255,255,0.01) 100%);
            border: 1px solid rgba(255,255,255,0.06);
            backdrop-filter: blur(20px);
        }
        .card:hover {
            border-color: rgba(99, 102, 241, 0.3);
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.05) 0%, rgba(255,255,255,0.02) 100%);
        }
        .glow { box-shadow: 0 0 40px rgba(99, 102, 241, 0.15); }
        .btn-glow:hover { box-shadow: 0 0 20px rgba(29, 161, 242, 0.4); }
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        input:focus {
            outline: none;
            border-color: #1DA1F2;
            box-shadow: 0 0 0 3px rgba(29, 161, 242, 0.1);
        }
    </style>
</head>
<body class="bg-grid text-slate-300">
    <div class="max-w-2xl mx-auto px-5 py-8">
        <header class="flex items-center justify-between mb-8">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-indigo-500 to-purple-500 flex items-center justify-center">
                    <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/>
                    </svg>
                </div>
                <h1 class="text-xl font-semibold text-white">24H 交互助手</h1>
            </div>
            
            <div class="flex items-center gap-2">
                <button onclick="document.getElementById('leaderboardSection').scrollIntoView({behavior: 'smooth'})" class="px-3 py-1.5 bg-white/5 hover:bg-white/10 border border-white/10 rounded-lg text-sm text-white transition-all">贡献榜</button>
            </div>
            
            <div id="userInfo" class="flex items-center gap-2">
                <button onclick="window.location.href='https://twitter.com/i/oauth2/authorize?response_type=code&client_id=T05CT3pQT0hOcE1vQlJrVHN0Y3E6MTpjaQ&redirect_uri=https://task-tracker-kohl-one-14.vercel.app&scope=tweet.read%20users.read&state=xyz'" class="px-5 py-2 bg-[#1DA1F2] hover:bg-[#1a91da] rounded-lg text-sm font-medium text-white transition-all glow btn-glow flex items-center gap-2">
                    <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M23.953 4.57a10 10 0 01-2.825.775 4.958 4.958 0 002.163-2.723c-.951.555-2.005.959-3.127 1.184a4.92 4.92 0 00-8.384 4.482C7.69 8.095 4.067 6.13 1.64 3.162a4.822 4.822 0 00-.666 2.475c0 1.71.87 3.213 2.188 4.096a4.904 4.904 0 01-2.228-.616v.06a4.923 4.923 0 003.946 4.827 4.996 4.996 0 01-2.212.085 4.936 4.936 0 004.604 3.417 9.867 9.867 0 01-6.102 2.105c-.39 0-.779-.023-1.17-.067a13.995 13.995 0 007.557 2.209c9.053 0 13.998-7.496 13.998-13.985 0-.21 0-.42-.015-.63A9.935 9.935 0 0024 4.59z"/></svg>
                    Twitter登录
                </button>
            </div>
        </header>
        
        <div class="card rounded-2xl p-5 mb-6">
            <div class="flex items-center justify-between">
                <div>
                    <div class="text-xs text-slate-500 uppercase tracking-wider mb-1">距离重置</div>
                    <div class="text-4xl font-light text-white" id="timer">00:00:00</div>
                </div>
            </div>
        </div>
        
        <div id="mainContent" class="hidden">
            <div class="card rounded-2xl p-5 mb-6">
                <div class="flex items-center justify-between mb-3">
                    <span class="text-sm text-slate-400">解锁进度</span>
                    <span class="text-sm font-medium text-white" id="progressText">0/3</span>
                </div>
                <div class="h-1.5 bg-white/5 rounded-full overflow-hidden">
                    <div id="progressBar" class="h-full bg-gradient-to-r from-indigo-500 to-purple-500 rounded-full transition-all duration-500" style="width: 0%"></div>
                </div>
                <p class="text-xs text-slate-500 mt-3" id="progressHint">完成 3 次互动解锁提交功能</p>
            </div>
            
            <div class="grid grid-cols-3 gap-3 mb-6">
                <div class="card rounded-xl p-4 text-center">
                    <div class="text-2xl font-semibold text-white" id="linksSubmitted">0</div>
                    <div class="text-xs text-slate-500 mt-1">推文总数</div>
                </div>
                <div class="card rounded-xl p-4 text-center">
                    <div class="text-2xl font-semibold text-white" id="interactionsDone">0</div>
                    <div class="text-xs text-slate-500 mt-1">已完成互动</div>
                </div>
                <div class="card rounded-xl p-4 text-center">
                    <div class="text-2xl font-semibold text-purple-400" id="pendingNeeded">3</div>
                    <div class="text-xs text-slate-500 mt-1">还需互动</div>
                </div>
            </div>
            
            <div class="card rounded-2xl p-5 mb-6">
                <h3 class="text-sm font-medium text-slate-400 mb-3">提交你的链接</h3>
                <div class="flex gap-2" id="submitForm">
                    <input type="text" id="linkInput" class="flex-1 px-4 py-3 bg-white/5 border border-white/10 rounded-xl text-white text-sm placeholder-slate-500" placeholder="先完成互动任务来解锁..." disabled>
                    <button id="submitBtn" onclick="submitLink()" class="px-5 py-3 bg-white/5 border border-white/10 rounded-xl text-slate-400 text-sm font-medium cursor-not-allowed" disabled>提交</button>
                </div>
                <p id="unlockMessage" class="hidden text-center text-sm text-indigo-400 mt-3">✓ 已解锁提交功能</p>
            </div>
            
            <div class="mb-6">
                <h3 class="text-sm font-medium text-slate-400 mb-3">今日任务池</h3>
                <div id="taskList" class="space-y-2"></div>
                <div id="pagination" class="flex justify-center gap-1 mt-4"></div>
            </div>
        </div>
        
        <div id="leaderboardSection">
            <h3 class="text-sm font-medium text-slate-400 mb-3">贡献榜</h3>
            <div id="leaderboardList" class="space-y-2"></div>
        </div>
        
        <footer class="text-center py-8 text-slate-600 text-xs">
            24H 交互助手
        </footer>
    </div>
    
    <script>
        // 🚨 1. 初始化 Supabase
        const SUPABASE_URL = 'https://vejicltqodkdjchqlrqx.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZlamljbHRxb2RkZGpjaHFscnF4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwOTcxMDgsImV4cCI6MjA4OTY3MzEwOH0.uNeQttyjwZTjVhicd0oftdgWIkvdqFrtXLaCe9mjrJE';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // 🚨 2. 核心状态变量
        let currentUser = null; 
        let userProgress = { interactions_done: 0, required: 3, is_unlocked: false };
        let allTasks = [];
        let currentPage = 1;
        const TASKS_PER_PAGE = 20;

        // Twitter OAuth 登录
        function twitterLogin() {
            // 直接跳转 Twitter 授权页面
            const clientId = 'T05CT3pQT0hOcE1vQlJrVHN0Y3E6MTpjaQ';
            const redirectUri = encodeURIComponent('https://task-tracker-kohl-one-14.vercel.app/callback');
            const authUrl = `https://twitter.com/i/oauth2/authorize?response_type=code&client_id=${clientId}&redirect_uri=${redirectUri}&scope=tweet.read%20users.read&state=xyz&code_challenge=challenge&code_challenge_method=plain`;
            window.location.href = authUrl;
        }
        
        // 处理回调
        function handleCallback() {
            const params = new URLSearchParams(window.location.search);
            const code = params.get('code');
            if (code) {
                // 简化：让用户确认身份
                const username = prompt('请输入你的Twitter用户名确认:');
                if (username) {
                    loginWithUsername(username);
                }
            }
        }
        
        function loginWithUsername(username) {
            username = username.trim().replace('@', '');
            if (!username) return;
            
            currentUser = {
                username: username,
                name: username,
                avatar: 'https://api.dicebear.com/7.x/avataaars/svg?seed=' + username,
                links: 0,
                interactions: 0,
                score: 0
            };
            
            localStorage.setItem('user_data_' + username, JSON.stringify(currentUser));
            
            document.getElementById('userInfo').innerHTML = `
                <div class="flex items-center gap-3 fade-in">
                    <img src="${currentUser.avatar}" class="w-10 h-10 rounded-full border-2 border-[#1DA1F2]">
                    <div class="flex flex-col">
                        <span class="text-white font-medium">@${username}</span>
                        <span class="text-xs text-[#1DA1F2]">已连接</span>
                    </div>
                    <button onclick="logout2()" class="ml-3 px-3 py-1.5 bg-red-500/10 text-red-400 rounded-lg text-xs">退出</button>
                </div>`;
            
            document.getElementById('mainContent').classList.remove('hidden');
            loadTasks();
            loadLeaderboard();
        }
        
        function logout2() {
            currentUser = null;
            window.location.reload();
        }

        // 🚨 4. 安全断开引擎
        async function logout() {
            await supabase.auth.signOut();
            window.location.reload();
        }

        // 🚨 5. 身份验资
        async function checkAuth() {
            const { data: { session } } = await supabase.auth.getSession();
            
            if (session) {
                const meta = session.user.user_metadata;
                const avatar = (meta.avatar_url || '').replace('_normal', '');
                const username = meta.preferred_username || meta.name || 'Hacker';
                
                const savedUser = JSON.parse(localStorage.getItem('user_data_' + username) || '{}');
                currentUser = {
                    username: username,
                    avatar: avatar,
                    links: savedUser.links || 0,
                    interactions: savedUser.interactions || 0,
                    score: savedUser.score || 0
                };

                document.getElementById('userInfo').innerHTML = `
                    <div class="flex items-center gap-3 fade-in">
                        <img src="${avatar}" class="w-10 h-10 rounded-full border-2 border-[#1DA1F2] glow">
                        <div class="flex flex-col">
                            <span class="text-white font-medium">@${username}</span>
                            <span class="text-xs text-[#1DA1F2]">已连接矩阵</span>
                        </div>
                        <button onclick="logout()" class="ml-3 px-3 py-1.5 bg-red-500/10 text-red-400 hover:bg-red-500/20 rounded-lg text-xs transition-all">断开连接</button>
                    </div>`;
                
                document.getElementById('mainContent').classList.remove('hidden');
                loadTasks();
                loadLeaderboard();
            } else {
                document.getElementById('mainContent').classList.add('hidden');
                loadLeaderboard(); 
            }
        }

        checkAuth();

        function updateCountdown() {
            const now = new Date();
            const midnight = new Date(now);
            midnight.setHours(24, 0, 0, 0);
            const seconds = Math.floor((midnight - now) / 1000);
            
            const lastDate = localStorage.getItem('last_reset_date');
            const today = now.toDateString();
            if (lastDate !== today && seconds < 3600) {
                localStorage.setItem('done_tasks', '[]');
                localStorage.setItem('user_tasks', '[]');
                localStorage.setItem('last_reset_date', today);
                if(currentUser) {
                    userProgress.interactions_done = 0;
                    currentUser.interactions = 0;
                }
                location.reload();
                return;
            }
            
            const h = Math.floor(seconds / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            const s = seconds % 60;
            const timerEl = document.getElementById('timer');
            if(timerEl) timerEl.textContent = String(h).padStart(2,'0') + ':' + String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
        }
        setInterval(updateCountdown, 1000);
        updateCountdown();

        async function loadTasks() {
            if(!currentUser) return;
            const userKey = currentUser.username;
            const doneKey = 'done_tasks_' + userKey;
            const tasksKey = 'user_tasks_' + userKey;
            const doneTasks = JSON.parse(localStorage.getItem(doneKey) || '[]');
            const savedTasks = JSON.parse(localStorage.getItem(tasksKey) || '[]');
            
            if (savedTasks.length > 0) {
                allTasks = savedTasks;
            } else {
                try {
                    const res = await fetch('/api/tasks');
                    allTasks = await res.json();
                } catch (e) {
                    allTasks = [];
                    for (let i = 1; i <= 50; i++) {
                        allTasks.push({id: i, username: 'web3_hunter_' + i, avatar: 'https://api.dicebear.com/7.x/avataaars/svg?seed=' + i, link: '#', liked: false, retweeted: false, commented: false});
                    }
                }
            }
            
            allTasks.forEach(task => {
                if (doneTasks.includes(task.id)) {
                    task.liked = task.retweeted = task.commented = true;
                }
            });
            
            userProgress.interactions_done = doneTasks.length;
            document.getElementById('interactionsDone').textContent = doneTasks.length;
            document.getElementById('pendingNeeded').textContent = Math.max(0, userProgress.required - doneTasks.length);
            const percent = Math.min(100, (doneTasks.length / userProgress.required) * 100);
            document.getElementById('progressBar').style.width = percent + '%';
            document.getElementById('progressText').textContent = doneTasks.length + '/' + userProgress.required;
            
            if (doneTasks.length >= userProgress.required) {
                userProgress.is_unlocked = true;
                document.getElementById('linkInput').disabled = false;
                document.getElementById('submitBtn').disabled = false;
                document.getElementById('submitBtn').classList.remove('bg-white/5', 'text-slate-400', 'cursor-not-allowed');
                document.getElementById('submitBtn').classList.add('bg-indigo-500', 'text-white', 'btn-glow');
            }
            
            currentPage = 1;
            document.getElementById('linksSubmitted').textContent = allTasks.length;
            renderTasks();
            renderPagination();
        }

        function renderTasks() {
            const start = (currentPage - 1) * TASKS_PER_PAGE;
            const tasks = allTasks.slice(start, start + TASKS_PER_PAGE);
            const list = document.getElementById('taskList');
            
            list.innerHTML = tasks.map(task => {
                const isDone = task.liked && task.retweeted && task.commented;
                return '<div class="card rounded-xl p-3 flex items-center justify-between fade-in"><div class="flex items-center gap-3"><img src="' + task.avatar + '" class="w-8 h-8 rounded-full border border-white/10"><a href="' + task.link + '" target="_blank" class="text-sm text-white hover:text-indigo-400">@' + task.username + '</a></div><a href="' + task.link + '" target="_blank" onclick="setTimeout(() => markAsDone(' + task.id + '), 1500)" class="px-4 py-1.5 rounded-lg text-xs font-medium ' + (isDone ? 'bg-white/5 text-slate-500' : 'bg-[#1DA1F2]/20 text-[#1DA1F2] border border-[#1DA1F2]/30 hover:bg-[#1DA1F2]/30') + '">' + (isDone ? '✓ 已完成' : '去互动') + '</a></div>';
            }).join('');
        }

        function renderPagination() {
            const total = Math.ceil(allTasks.length / TASKS_PER_PAGE);
            const p = document.getElementById('pagination');
            if (total <= 1) { p.innerHTML = ''; return; }
            let html = '';
            html += '<button onclick="goToPage(' + (currentPage - 1) + ')" ' + (currentPage === 1 ? 'disabled' : '') + ' class="w-8 h-8 rounded-lg text-xs ' + (currentPage === 1 ? 'opacity-30 cursor-not-allowed' : 'bg-white/5 text-slate-400 hover:bg-white/10') + '">‹</button>';
            for (let i = 1; i <= total; i++) {
                html += '<button onclick="goToPage(' + i + ')" class="w-8 h-8 rounded-lg text-xs ' + (i === currentPage ? 'bg-indigo-500 text-white' : 'bg-white/5 text-slate-400 hover:bg-white/10') + '">' + i + '</button>';
            }
            html += '<button onclick="goToPage(' + (currentPage + 1) + ')" ' + (currentPage === total ? 'disabled' : '') + ' class="w-8 h-8 rounded-lg text-xs ' + (currentPage === total ? 'opacity-30 cursor-not-allowed' : 'bg-white/5 text-slate-400 hover:bg-white/10') + '">›</button>';
            p.innerHTML = html;
        }

        function goToPage(page) { 
            const total = Math.ceil(allTasks.length / TASKS_PER_PAGE);
            if (page < 1 || page > total) return;
            currentPage = page; 
            renderTasks();
            renderPagination();
        }

        async function loadLeaderboard() {
            let users = JSON.parse(localStorage.getItem('leaderboard') || '[]');
            
            if (currentUser) {
                const idx = users.findIndex(u => u.username === currentUser.username);
                const userData = { username: currentUser.username, avatar: currentUser.avatar, score: currentUser.score || 0 };
                if (idx >= 0) { users[idx].score = Math.max(users[idx].score, userData.score); }
                else { users.push(userData); }
            }
            
            users.sort((a, b) => (b.score || 0) - (a.score || 0));
            users = users.slice(0, 10);
            renderLeaderboard(users);
        }

        function renderLeaderboard(users) {
            const medals = ['🥇', '🥈', '🥉'];
            document.getElementById('leaderboardList').innerHTML = users.map((u, i) => 
                '<div class="card rounded-lg p-3 flex items-center"><span class="w-6 ' + (i < 3 ? 'text-yellow-400' : 'text-slate-500') + '">' + (i < 3 ? medals[i] : i+1) + '</span><img src="' + (u.avatar || '') + '" class="w-6 h-6 rounded-full mx-3 border border-white/10"><span class="flex-1 text-sm text-white">@' + u.username + '</span><span class="text-xs text-purple-400 font-bold">' + (u.score || 0) + ' 分</span></div>'
            ).join('');
        }

        function markAsDone(taskId) {
            const task = allTasks.find(t => t.id === taskId);
            if (task) {
                task.liked = task.retweeted = task.commented = true;
                renderTasks();
                if (userProgress.interactions_done < userProgress.required) {
                    userProgress.interactions_done++;
                }
                currentUser.interactions = userProgress.interactions_done;
                
                // 保存到 localStorage
                const userKey = currentUser.username;
                const doneKey = 'done_tasks_' + userKey;
                const doneTasks = JSON.parse(localStorage.getItem(doneKey) || '[]');
                if (!doneTasks.includes(taskId)) {
                    doneTasks.push(taskId);
                    localStorage.setItem(doneKey, JSON.stringify(doneTasks));
                }
                
                // 更新积分
                currentUser.score = (currentUser.score || 0) + 150;
                localStorage.setItem('user_data_' + currentUser.username, JSON.stringify(currentUser));
                
                // 更新排行榜
                const leaderboard = JSON.parse(localStorage.getItem('leaderboard') || '[]');
                const idx = leaderboard.findIndex(u => u.username === currentUser.username);
                if (idx >= 0) { leaderboard[idx].score = currentUser.score; }
                else { leaderboard.push({ username: currentUser.username, avatar: currentUser.avatar, score: currentUser.score }); }
                leaderboard.sort((a, b) => b.score - a.score);
                localStorage.setItem('leaderboard', JSON.stringify(leaderboard));
                
                // 播放提示音
                try { new Audio('https://www.soundjay.com/buttons/sounds/button-3.mp3').play(); } catch(e) {}
                
                document.getElementById('interactionsDone').textContent = userProgress.interactions_done;
                document.getElementById('pendingNeeded').textContent = Math.max(0, userProgress.required - userProgress.interactions_done);
                const percent = Math.min(100, (userProgress.interactions_done / userProgress.required) * 100);
                document.getElementById('progressBar').style.width = percent + '%';
                document.getElementById('progressText').textContent = userProgress.interactions_done + '/' + userProgress.required;
                
                if (userProgress.interactions_done >= userProgress.required) {
                    userProgress.is_unlocked = true;
                    document.getElementById('linkInput').disabled = false;
                    document.getElementById('linkInput').placeholder = '粘贴你的Twitter链接...';
                    document.getElementById('submitBtn').disabled = false;
                    document.getElementById('submitBtn').classList.remove('bg-white/5', 'text-slate-400', 'cursor-not-allowed');
                    document.getElementById('submitBtn').classList.add('bg-indigo-500', 'text-white', 'btn-glow');
                    document.getElementById('unlockMessage').classList.remove('hidden');
                    document.getElementById('progressHint').textContent = '✓ 已解锁提交功能';
                }
            }
        }

        function submitLink() {
            const link = document.getElementById('linkInput').value;
            if (!link) { alert('请输入链接'); return; }
            const already = allTasks.some(t => t.username === currentUser.username);
            if (already) { alert('今日已提交'); return; }
            
            allTasks.unshift({id: allTasks.length + 1, username: currentUser.username, avatar: currentUser.avatar, link: link, liked: false, retweeted: false, commented: false});
            const tasksKey = 'user_tasks_' + currentUser.username;
            localStorage.setItem(tasksKey, JSON.stringify(allTasks));
            document.getElementById('linksSubmitted').textContent = allTasks.length;
            document.getElementById('linkInput').value = '';
            
            // 扣除积分
            currentUser.score = (currentUser.score || 0) - 1000;
            localStorage.setItem('user_data_' + currentUser.username, JSON.stringify(currentUser));
            
            // 更新排行榜
            const leaderboard = JSON.parse(localStorage.getItem('leaderboard') || '[]');
            const idx = leaderboard.findIndex(u => u.username === currentUser.username);
            if (idx >= 0) { leaderboard[idx].score = currentUser.score; }
            else { leaderboard.push({ username: currentUser.username, avatar: currentUser.avatar, score: currentUser.score }); }
            leaderboard.sort((a, b) => b.score - a.score);
            localStorage.setItem('leaderboard', JSON.stringify(leaderboard));
            
            renderTasks();
            renderPagination();
            alert('提交成功！');
        }
    </script>
</body>
</html>
