<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>24h 交互矩阵</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: linear-gradient(165deg, #0f172a 0%, #1e293b 50%, #1e293b 100%);
            min-height: 100vh;
        }
        .card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 8px;
        }
        .card:hover {
            border-color: #3b82f6;
        }
        .btn {
            transition: all 0.15s ease;
        }
        .input {
            background: #0f172a;
            border: 1px solid #334155;
            color: #f1f5f9;
        }
        .input:focus {
            border-color: #3b82f6;
            outline: none;
        }
    </style>
</head>
<body class="text-slate-200">
    <div class="max-w-3xl mx-auto px-4 py-6">
        <!-- 倒计时 -->
        <div class="bg-slate-800 rounded-lg p-4 mb-4 border-l-4 border-red-500">
            <div class="text-red-400 text-sm font-medium">距离今日任务重置还有</div>
            <div class="text-3xl font-mono font-bold text-red-400 mt-1" id="timer">00:00:00</div>
            <div class="text-slate-400 text-xs mt-1">UTC 00:00 重置 (北京时间 08:00)</div>
        </div>
        
        <!-- Header -->
        <header class="flex items-center justify-between py-4 border-b border-slate-700">
            <h1 class="text-xl font-semibold text-white">24h 交互矩阵</h1>
            <div id="userInfo">
                <a href="/auth/twitter" class="px-4 py-2 bg-sky-500 text-white rounded-lg font-medium hover:bg-sky-400">Twitter 登录</a>
            </div>
        </header>
        
        <div id="mainContent" class="hidden">
            <!-- 互动进度条 -->
            <div class="card p-4 my-4">
                <div class="flex justify-between items-center mb-2">
                    <span class="text-sm text-slate-400">提交解锁进度</span>
                    <span class="text-sm text-white font-medium" id="progressText">0/3</span>
                </div>
                <div class="h-1.5 bg-slate-700 rounded-full overflow-hidden">
                    <div id="progressBar" class="h-full bg-gradient-to-r from-amber-500 to-red-500" style="width: 0%"></div>
                </div>
                <p class="text-xs text-slate-400 mt-2" id="progressHint">完成 3 次互动任务即可解锁提交功能</p>
            </div>
            
            <!-- Stats -->
            <div class="grid grid-cols-3 gap-3 my-4">
                <div class="card p-4 text-center">
                    <div class="text-2xl font-bold text-sky-400" id="linksSubmitted">0</div>
                    <div class="text-xs text-slate-400 mt-1">今日提交</div>
                </div>
                <div class="card p-4 text-center">
                    <div class="text-2xl font-bold text-white" id="interactionsDone">0</div>
                    <div class="text-xs text-slate-400 mt-1">已完成互动</div>
                </div>
                <div class="card p-4 text-center border-red-500/30" id="pendingCard">
                    <div class="text-2xl font-bold text-red-400" id="pendingNeeded">3</div>
                    <div class="text-xs text-slate-400 mt-1">还需互动</div>
                </div>
            </div>
            
            <!-- Submit -->
            <div class="card p-5 my-5">
                <h3 class="text-base font-medium text-white mb-3">提交你的链接</h3>
                <div class="flex gap-3" id="submitForm">
                    <input type="text" id="linkInput" class="input flex-1 px-4 py-3 rounded-lg text-sm opacity-50 cursor-not-allowed" placeholder="先完成互动任务来解锁提交..." disabled>
                    <button id="submitBtn" class="px-5 py-3 bg-slate-700 text-slate-400 rounded-lg font-medium cursor-not-allowed" disabled>提交</button>
                </div>
                <p id="unlockMessage" class="mt-3 text-center text-sky-400 text-sm hidden">已解锁！可以提交链接了</p>
            </div>
            
            <!-- Task List -->
            <div class="my-5">
                <div class="flex justify-between items-center mb-3">
                    <h3 class="text-base font-medium text-white">今日任务池</h3>
                    <span class="text-slate-400 text-sm" id="taskCount">0 个任务</span>
                </div>
                <div id="taskList" class="space-y-2"></div>
                <div id="pagination" class="flex justify-center gap-1 mt-6"></div>
            </div>
        </div>
        
        <!-- Leaderboard -->
        <div class="mt-8">
            <h3 class="text-base font-medium text-white mb-3">贡献排行榜</h3>
            <div id="leaderboardList" class="space-y-2"></div>
        </div>
        
        <footer class="text-center py-6 text-slate-400 text-sm border-t border-slate-700 mt-8">
            24h 交互矩阵
        </footer>
    </div>
    
    <script>
        let currentUser = null;
        let allTasks = [];
        let currentPage = 1;
        const TASKS_PER_PAGE = 20;
        
        async function updateCountdown() {
            try {
                const res = await fetch('/api/countdown');
                const data = await res.json();
                const h = Math.floor(data.seconds / 3600);
                const m = Math.floor((data.seconds % 3600) / 60);
                const s = data.seconds % 60;
                document.getElementById('timer').textContent = String(h).padStart(2,'0') + ':' + String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
            } catch (e) {}
        }
        setInterval(updateCountdown, 1000);
        updateCountdown();
        
        async function init() {
            try {
                const res = await fetch('/api/user');
                currentUser = await res.json();
            } catch (e) {
                currentUser = {id: 1, username: 'demo', avatar: 'https://picsum.photos/100', links: 3, interactions: 4};
            }
            showLoggedIn();
        }
        
        let userProgress = { interactions_done: 0, required: 3, is_unlocked: false };
        
        function showLoggedIn() {
            document.getElementById('userInfo').innerHTML = '<img src="' + currentUser.avatar + '" class="w-8 h-8 rounded-full"><span class="font-medium">@' + currentUser.username + '</span>';
            document.getElementById('mainContent').classList.remove('hidden');
            document.getElementById('linksSubmitted').textContent = currentUser.links;
            document.getElementById('interactionsDone').textContent = currentUser.interactions;
            loadTasks();
            loadLeaderboard();
        }
        
        async function loadTasks() {
            try {
                const res = await fetch('/api/tasks');
                allTasks = await res.json();
            } catch (e) {
                allTasks = [];
                for (let i = 1; i <= 25; i++) {
                    allTasks.push({id: i, username: 'user_' + i, avatar: 'https://picsum.photos/' + (100+i), link: 'https://x.com/user_' + i + '/status/' + (123456780+i), liked: false, retweeted: false, commented: false});
                }
            }
            currentPage = 1;
            renderTasks();
            renderPagination();
        }
        
        function renderTasks() {
            const start = (currentPage - 1) * TASKS_PER_PAGE;
            const tasks = allTasks.slice(start, start + TASKS_PER_PAGE);
            const list = document.getElementById('taskList');
            document.getElementById('taskCount').textContent = allTasks.length + ' 个任务 (' + currentPage + '/' + Math.ceil(allTasks.length/TASKS_PER_PAGE) + ')';
            list.innerHTML = tasks.map(task => {
                const isDone = task.liked && task.retweeted && task.commented;
                return '<div class="card p-3 flex items-center justify-between"><div class="flex items-center gap-3"><img src="' + task.avatar + '" class="w-8 h-8 rounded-full"><a href="' + task.link + '" target="_blank" class="text-sm text-slate-300 hover:text-sky-400">@' + task.username + '</a></div><button onclick="markAsDone(' + task.id + ')" class="px-4 py-1.5 rounded-lg text-sm ' + (isDone ? 'bg-slate-700 text-slate-400' : 'bg-sky-500/20 text-sky-400 border border-sky-500/30') + '">' + (isDone ? '已完成' : '去互动') + '</button></div>';
            }).join('');
        }
        
        function renderPagination() {
            const total = Math.ceil(allTasks.length / TASKS_PER_PAGE);
            const p = document.getElementById('pagination');
            if (total <= 1) { p.innerHTML = ''; return; }
            let html = '';
            for (let i = 1; i <= total; i++) {
                html += '<button onclick="goToPage(' + i + ')" class="w-8 h-8 rounded ' + (i === currentPage ? 'bg-sky-500/20 border border-sky-500 text-sky-400' : 'bg-slate-700 border border-slate-600 text-slate-400 hover:border-sky-500') + '">' + i + '</button>';
            }
            p.innerHTML = html;
        }
        
        function goToPage(page) {
            currentPage = page;
            renderTasks();
            renderPagination();
        }
        
        async function loadLeaderboard() {
            try {
                const res = await fetch('/api/users');
                const users = await res.json();
                renderLeaderboard(users);
            } catch (e) { renderLeaderboard([]); }
        }
        
        function renderLeaderboard(users) {
            const medals = ['🥇', '🥈', '🥉'];
            document.getElementById('leaderboardList').innerHTML = users.map((u, i) => 
                '<div class="card p-3 flex items-center"><span class="w-6 ' + (i < 3 ? 'text-yellow-400' : 'text-slate-400') + '">' + (i < 3 ? medals[i] : i+1) + '</span><img src="' + u.avatar + '" class="w-7 h-7 rounded-full mx-3"><span class="flex-1 text-sm text-white">@' + u.username + '</span><div class="text-xs text-slate-400">📤' + u.links + ' 💬' + u.interactions + '</div></div>'
            ).join('');
        }
        
        function markAsDone(taskId) {
            const task = allTasks.find(t => t.id === taskId);
            if (task) {
                task.liked = true;
                task.retweeted = true;
                task.commented = true;
                renderTasks();
            }
        }
        
        init();
    </script>
</body>
</html>
