<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>24h 交互矩阵</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --bg-dark: #0B0F19; --cyan: #22d3ee; }
        body { background-color: var(--bg-dark); color: white; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); }
        .text-gradient { background: linear-gradient(to right, #22d3ee, #3b82f6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .font-mono { font-family: 'Courier New', monospace; }
        
        @keyframes unlockPulse {
            0% { box-shadow: 0 0 0 0 rgba(34, 211, 238, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(34, 211, 238, 0); }
            100% { box-shadow: 0 0 0 0 rgba(34, 211, 238, 0); }
        }
        .unlock-animation { animation: unlockPulse 0.6s ease-out; }
        .input-locked { opacity: 0.5; cursor: not-allowed; border-color: #4b5563 !important; }
        
        .restricted-badge { background: linear-gradient(135deg, #ef4444, #b91c1c); animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.8; } }
    </style>
</head>
<body class="bg-[#0B0F19] text-white min-h-screen">
    <div class="max-w-3xl mx-auto px-5 py-6">
        <!-- 倒计时 -->
        <div id="countdown" class="glass rounded-xl p-4 mb-4 border border-red-500/30 text-center">
            <div class="text-red-500 text-sm font-semibold tracking-wider">⏰ 距离今日任务重置还有：</div>
            <div id="timer" class="text-3xl font-mono font-bold text-red-500 mt-1">00:00:00</div>
            <div class="text-gray-500 text-xs mt-1">UTC 00:00 重置 (北京时间 08:00)</div>
        </div>
        
        <!-- Header -->
        <header class="flex items-center justify-between py-5 border-b border-gray-800">
            <h1 class="text-2xl font-bold bg-gradient-to-r from-cyan-400 to-green-400 bg-clip-text text-transparent">24h 交互矩阵</h1>
            <div id="userInfo">
                <a href="/auth/twitter" class="px-4 py-2 bg-[#1DA1F2] text-white rounded-lg font-semibold">Twitter 登录</a>
            </div>
        </header>
        
        <div id="mainContent" class="hidden">
            <!-- 互动进度条 -->
            <div class="glass rounded-xl p-4 my-4 border border-gray-800" id="progressSection">
                <div class="flex justify-between items-center mb-2">
                    <span class="text-sm text-gray-400">🔒 提交解锁进度</span>
                    <span class="text-sm" id="progressText">0/3</span>
                </div>
                <div class="h-2 bg-gray-700 rounded-full overflow-hidden">
                    <div id="progressBar" class="h-full bg-gradient-to-r from-yellow-400 to-orange-500 transition-all duration-500" style="width: 0%"></div>
                </div>
                <p class="text-xs text-gray-500 mt-2" id="progressHint">⚡ 完成 3 次互动任务即可解锁提交功能</p>
            </div>
            
            <!-- 限制用户警告 -->
            <div id="restrictedWarning" class="hidden glass rounded-xl p-4 my-4 border border-red-500 restricted-badge">
                <div class="flex items-center gap-2"><span class="text-xl">🚫</span><span class="font-bold">您已被限制提交</span></div>
                <p class="text-sm mt-2">您的信用分过低，请先补齐欠下的互动后再提交</p>
            </div>
            
            <!-- Stats Cards -->
            <div class="grid grid-cols-3 gap-4 my-4">
                <div class="glass rounded-2xl p-5 border border-gray-800">
                    <div class="text-3xl font-bold text-cyan-400" id="linksSubmitted">0</div>
                    <div class="text-gray-400 text-sm mt-1">📤 今日提交</div>
                </div>
                <div class="glass rounded-2xl p-5 border border-gray-800">
                    <div class="text-3xl font-bold text-gradient" id="interactionsDone">0</div>
                    <div class="text-gray-400 text-sm mt-1">💬 已完成互动</div>
                </div>
                <div class="glass rounded-2xl p-5 border border-red-500/50" id="pendingCard">
                    <div class="text-3xl font-bold text-red-500" id="pendingNeeded">3</div>
                    <div class="text-gray-400 text-sm mt-1">⏳ 还需互动</div>
                </div>
            </div>
            
            <!-- Submit Section -->
            <div class="glass rounded-2xl p-5 my-5">
                <h3 class="text-lg font-semibold mb-4">📤 提交你的链接</h3>
                <div class="flex gap-3" id="submitForm">
                    <input type="text" id="linkInput" 
                        class="flex-1 px-4 py-3 bg-[#0B0F19] border border-gray-600 rounded-lg text-white placeholder-gray-500 focus:outline-none input-locked"
                        placeholder="先完成互动任务来解锁提交..." disabled>
                    <button id="submitBtn" onclick="submitLink()" 
                        class="px-6 py-3 bg-gray-600 text-gray-400 font-semibold rounded-lg cursor-not-allowed" disabled>提交</button>
                </div>
                <div id="unlockMessage" class="mt-3 text-center text-cyan-400 hidden">🔓 已解锁！可以提交你的链接了</div>
            </div>
            
            <!-- Task List -->
            <div class="my-5">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="text-lg font-semibold">📋 今日任务池 <span class="text-gray-500 text-sm">(随机打乱)</span></h3>
                    <span class="text-gray-400" id="taskCount">0 个任务</span>
                </div>
                <div id="taskList" class="space-y-3"></div>
                
                <!-- 分页器 -->
                <div id="pagination" class="flex justify-center items-center space-x-2 mt-6"></div>
            </div>
        </div>
        
        <!-- Leaderboard -->
        <div class="mt-8">
            <h3 class="text-lg font-semibold mb-4">🏆 今日贡献榜</h3>
            <div id="leaderboardList" class="space-y-2"></div>
        </div>
        
        <footer class="text-center py-6 text-gray-500 text-sm">24h 交互矩阵</footer>
    </div>
    
    <script>
        let currentUser = null;
        let allTasks = [];
        let displayedTasks = [];
        let currentPage = 1;
        const TASKS_PER_PAGE = 20;
        
        // 倒计时
        async function updateCountdown() {
            try {
                const res = await fetch('/api/countdown');
                const data = await res.json();
                const seconds = data.seconds;
                const hours = Math.floor(seconds / 3600);
                const mins = Math.floor((seconds % 3600) / 60);
                const secs = seconds % 60;
                document.getElementById('timer').textContent = 
                    `${String(hours).padStart(2, '0')}:${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
            } catch (e) {}
        }
        setInterval(updateCountdown, 1000);
        updateCountdown();
        
        async function init() {
            try { await fetch('/api/config'); } catch (e) {}
            try {
                const res = await fetch('/api/user');
                currentUser = await res.json();
                showLoggedIn(currentUser);
            } catch (e) {
                currentUser = {id: 1, username: 'crypto_king', avatar: 'https://picsum.photos/100', links: 3, interactions: 4, credit_score: 7};
                showLoggedIn(currentUser);
            }
        }
        
        let userProgress = { interactions_done: 0, required: 3, remaining: 3, is_unlocked: false, is_restricted: false };
        
        async function loadProgress() {
            try {
                const res = await fetch('/api/my-progress');
                userProgress = await res.json();
                updateProgressUI();
            } catch (e) {}
        }
        
        function updateProgressUI() {
            const progress = userProgress;
            const percent = Math.min(100, (progress.interactions_done / progress.required) * 100);
            
            document.getElementById('progressBar').style.width = percent + '%';
            document.getElementById('progressText').textContent = `${progress.interactions_done}/${progress.required}`;
            
            if (progress.is_unlocked) {
                document.getElementById('linkInput').disabled = false;
                document.getElementById('linkInput').classList.remove('input-locked');
                document.getElementById('linkInput').classList.add('border-cyan-500');
                document.getElementById('linkInput').placeholder = '粘贴你的Twitter链接...';
                
                document.getElementById('submitBtn').disabled = false;
                document.getElementById('submitBtn').classList.remove('bg-gray-600', 'text-gray-400', 'cursor-not-allowed');
                document.getElementById('submitBtn').classList.add('bg-cyan-500', 'text-black', 'hover:bg-cyan-400');
                
                document.getElementById('unlockMessage').classList.remove('hidden');
                document.getElementById('progressHint').textContent = '✅ 已解锁！可以提交你的链接了';
                document.getElementById('progressHint').classList.add('text-cyan-400');
                playUnlockSound();
            } else {
                document.getElementById('linkInput').disabled = true;
                document.getElementById('linkInput').classList.add('input-locked');
                document.getElementById('submitBtn').disabled = true;
                document.getElementById('unlockMessage').classList.add('hidden');
            }
            
            if (progress.is_restricted) {
                document.getElementById('restrictedWarning').classList.remove('hidden');
                document.getElementById('submitForm').classList.add('hidden');
            }
        }
        
        function playUnlockSound() {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                oscillator.frequency.setValueAtTime(880, audioCtx.currentTime);
                oscillator.frequency.setValueAtTime(1100, audioCtx.currentTime + 0.1);
                oscillator.frequency.setValueAtTime(1320, audioCtx.currentTime + 0.2);
                gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
                oscillator.start(audioCtx.currentTime);
                oscillator.stop(audioCtx.currentTime + 0.4);
            } catch (e) {}
        }
        
        function showLoggedIn(user) {
            document.getElementById('userInfo').innerHTML = `<img src="${user.avatar}" class="w-10 h-10 rounded-full"><span class="font-semibold">@${user.username}</span>`;
            document.getElementById('mainContent').classList.remove('hidden');
            document.getElementById('linksSubmitted').textContent = user.links;
            document.getElementById('interactionsDone').textContent = user.interactions;
            loadProgress();
            loadTasks();
            loadLeaderboard();
        }
        
        async function loadTasks() {
            try {
                const res = await fetch('/api/tasks');
                allTasks = await res.json();
            } catch (e) {
                allTasks = [
                    {id: 1, userId: 1, username: 'crypto_king', avatar: 'https://picsum.photos/100', link: 'https://x.com/crypto_king/status/123456789', liked: false, retweeted: false, commented: false},
                    {id: 2, userId: 2, username: 'defi_girl', avatar: 'https://picsum.photos/101', link: 'https://x.com/defi_girl/status/123456788', liked: false, retweeted: false, commented: false},
                    {id: 3, userId: 3, username: 'whale_watcher', avatar: 'https://picsum.photos/102', link: 'https://x.com/whale_watcher/status/123456787', liked: false, retweeted: false, commented: false},
                    {id: 4, userId: 4, username: 'nft_collector', avatar: 'https://picsum.photos/103', link: 'https://x.com/nft_collector/status/123456786', liked: false, retweeted: false, commented: false},
                    {id: 5, userId: 5, username: 'memecoin_lad', avatar: 'https://picsum.photos/104', link: 'https://x.com/memecoin_lad/status/123456785', liked: false, retweeted: false, commented: false},
                ];
                // 生成更多测试数据
                for (let i = 6; i <= 50; i++) {
                    allTasks.push({
                        id: i, userId: i, username: `user_${i}`, avatar: `https://picsum.photos/${100+i%50}`, 
                        link: `https://x.com/user_${i}/status/${123456780+i}`, liked: false, retweeted: false, commented: false
                    });
                }
            }
            currentPage = 1;
            renderTasks();
            renderPagination();
        }
        
        function getDisplayedTasks() {
            const start = (currentPage - 1) * TASKS_PER_PAGE;
            return allTasks.slice(start, start + TASKS_PER_PAGE);
        }
        
        function getTotalPages() {
            return Math.ceil(allTasks.length / TASKS_PER_PAGE);
        }
        
        function renderTasks() {
            displayedTasks = getDisplayedTasks();
            const list = document.getElementById('taskList');
            document.getElementById('taskCount').textContent = `${allTasks.length} 个任务 (${currentPage}/${getTotalPages()})`;
            
            list.innerHTML = displayedTasks.map(task => {
                const isDone = task.liked && task.retweeted && task.commented;
                return `
                <div class="bg-[#131B2A] rounded-xl p-4 flex items-center justify-between border border-gray-800 hover:border-cyan-500/50 transition-colors">
                    <div class="flex items-center gap-3 flex-1 min-w-0">
                        <img src="${task.avatar}" class="w-9 h-9 rounded-full border border-gray-600">
                        <a href="${task.link}" target="_blank" class="text-gray-300 truncate hover:text-cyan-400">@${task.username} 的推文</a>
                    </div>
                    <a href="${task.link}" target="_blank" 
                        class="${isDone ? 'bg-gray-800/50 text-gray-500 border border-gray-700 px-6 py-2 rounded-lg font-mono text-sm cursor-not-allowed' : 'bg-cyan-500/10 text-cyan-400 border border-cyan-500/50 hover:bg-cyan-500/20 px-6 py-2 rounded-lg font-mono text-sm uppercase tracking-wider transition-all'}"
                        onclick="${isDone ? '' : `markAsDone(event, ${task.id})`}">
                        ${isDone ? 'DONE' : 'ACTION'}
                    </a>
                </div>`;
            }).join('');
        }
        
        function renderPagination() {
            const totalPages = getTotalPages();
            const pagination = document.getElementById('pagination');
            
            if (totalPages <= 1) {
                pagination.innerHTML = '';
                return;
            }
            
            let html = '';
            
            // 上一页
            html += `<button onclick="goToPage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''} 
                class="w-8 h-8 flex items-center justify-center rounded bg-[#131B2A] border border-gray-800 text-gray-400 hover:border-cyan-500 hover:text-cyan-400 transition-colors cursor-pointer text-sm font-mono ${currentPage === 1 ? 'opacity-50 cursor-not-allowed hover:border-gray-800 hover:text-gray-400' : ''}">&lt;</button>`;
            
            // 页码
            const maxVisiblePages = 5;
            let startPage = Math.max(1, currentPage - Math.floor(maxVisiblePages / 2));
            let endPage = Math.min(totalPages, startPage + maxVisiblePages - 1);
            
            if (endPage - startPage < maxVisiblePages - 1) {
                startPage = Math.max(1, endPage - maxVisiblePages + 1);
            }
            
            if (startPage > 1) {
                html += `<button onclick="goToPage(1)" class="w-8 h-8 flex items-center justify-center rounded bg-[#131B2A] border border-gray-800 text-gray-400 hover:border-cyan-500 hover:text-cyan-400 transition-colors cursor-pointer text-sm font-mono">1</button>`;
                if (startPage > 2) html += `<span class="text-gray-600">...</span>`;
            }
            
            for (let i = startPage; i <= endPage; i++) {
                if (i === currentPage) {
                    html += `<button class="w-8 h-8 flex items-center justify-center rounded bg-cyan-500/20 border border-cyan-500 text-cyan-400 font-bold shadow-[0_0_10px_rgba(34,211,238,0.3)] text-sm font-mono">${i}</button>`;
                } else {
                    html += `<button onclick="goToPage(${i})" class="w-8 h-8 flex items-center justify-center rounded bg-[#131B2A] border border-gray-800 text-gray-400 hover:border-cyan-500 hover:text-cyan-400 transition-colors cursor-pointer text-sm font-mono">${i}</button>`;
                }
            }
            
            if (endPage < totalPages) {
                if (endPage < totalPages - 1) html += `<span class="text-gray-600">...</span>`;
                html += `<button onclick="goToPage(${totalPages})" class="w-8 h-8 flex items-center justify-center rounded bg-[#131B2A] border border-gray-800 text-gray-400 hover:border-cyan-500 hover:text-cyan-400 transition-colors cursor-pointer text-sm font-mono">${totalPages}</button>`;
            }
            
            // 下一页
            html += `<button onclick="goToPage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''} 
                class="w-8 h-8 flex items-center justify-center rounded bg-[#131B2A] border border-gray-800 text-gray-400 hover:border-cyan-500 hover:text-cyan-400 transition-colors cursor-pointer text-sm font-mono ${currentPage === totalPages ? 'opacity-50 cursor-not-allowed hover:border-gray-800 hover:text-gray-400' : ''}">&gt;</button>`;
            
            pagination.innerHTML = html;
        }
        
        function goToPage(page) {
            const totalPages = getTotalPages();
            if (page < 1 || page > totalPages) return;
            currentPage = page;
            renderTasks();
            renderPagination();
        }
        
        async function loadLeaderboard() {
            try {
                const res = await fetch('/api/users');
                const users = await res.json();
                renderLeaderboard(users);
            } catch (e) { renderLeaderboard([]); }
        }
        
        function renderLeaderboard(users) {
            const list = document.getElementById('leaderboardList');
            const medals = ['🥇', '🥈', '🥉'];
            list.innerHTML = users.map((u, i) => `
                <div class="bg-[#131B2A] rounded-lg p-3 flex items-center ${u.is_restricted ? 'border border-red-500' : (u.interactions < 5 ? 'border border-red-500/30' : '')}">
                    <span class="w-8 text-lg font-bold ${i === 0 ? 'text-yellow-400' : (i === 1 ? 'text-gray-300' : (i === 2 ? 'text-orange-400' : 'text-gray-500'))}">${i < 3 ? medals[i] : (i + 1)}</span>
                    <img src="${u.avatar}" class="w-8 h-8 rounded-full mr-3">
                    <span class="flex-1 ${u.is_restricted ? 'text-red-500 font-bold' : (u.interactions < 5 ? 'text-red-500' : '')}">@${u.username}${u.is_restricted ? ' 🚫' : ''}</span>
                    <div class="text-right text-sm ${u.is_restricted ? 'text-red-500' : 'text-gray-400'}">
                        <div>📤${u.links} 💬${u.interactions}</div>
                        ${u.credit_score !== undefined ? `<div class="text-xs ${u.credit_score < 0 ? 'text-red-500' : 'text-gray-500'}">信用: ${u.credit_score}</div>` : ''}
                    </div>
                </div>`).join('');
        }
        
        async function submitLink() {
            const link = document.getElementById('linkInput').value;
            if (!link || !userProgress.is_unlocked) { alert('请先完成互动任务'); return; }
            try {
                const res = await fetch('/api/submit', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ link: link, username: currentUser?.username || 'demo_user' }) });
                const data = await res.json();
                if (data.success) { alert('提交成功！'); document.getElementById('linkInput').value = ''; loadTasks(); loadLeaderboard(); }
                else { alert(data.error || '提交失败'); }
            } catch (e) { alert('Demo模式 - 提交功能暂时禁用'); }
        }
        
        function markAsDone(event, taskId) {
            setTimeout(async () => {
                try { await fetch('/api/interact', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ taskId: taskId, action: 'like' }) }); } catch (e) {}
                const task = allTasks.find(t => t.id === taskId);
                if (task) { task.liked = task.retweeted = task.commented = true; renderTasks(); }
                userProgress.interactions_done++;
                userProgress.remaining = Math.max(0, userProgress.required - userProgress.interactions_done);
                userProgress.is_unlocked = userProgress.interactions_done >= userProgress.required;
                updateProgressUI();
            }, 2000);
        }
        
        init();
    </script>
</body>
</html>
