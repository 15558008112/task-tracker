    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // Supabase 配置
        const SUPABASE_URL = 'https://vejicltqodkdjchqlrqx.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZlamljbHRxb2RkZGpjaHFscnF4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwOTcxMDgsImV4cCI6MjA4OTY3MzEwOH0.uNeQttyjwZTjVhicd0oftdgWIkvdqFrtXLaCe9mjrJE';
        
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        // 触发登录 - 用户名秒登
        function login() {
            const username = prompt('请输入 Twitter 用户名（不带@）');
            if (username && username.trim()) {
                const u = username.trim().replace('@', '');
                currentUser = {
                    username: u,
                    name: u,
                    avatar: 'https://api.dicebear.com/7.x/avataaars/svg?seed=' + u,
                    links: 0,
                    interactions: 0
                };
                localStorage.setItem('twitter_user', JSON.stringify(currentUser));
                showLoggedIn();
            }
        }
        
        // 用户名登录 - 尝试获取真实头像
        async function loginWithUsername(username) {
            username = username.trim().replace('@', '');
            
            let avatar = '';
            let name = username;
            
            // 尝试从 Nitter 获取真实头像
            try {
                const response = await fetch('https://nitter.net/' + username, { mode: 'cors' });
                if (response.ok) {
                    const html = await response.text();
                    // 提取头像
                    const avatarMatch = html.match(/profile-popup__avatar[^>]*src="([^"]+)"/);
                    if (avatarMatch && avatarMatch[1]) {
                        avatar = avatarMatch[1].replace('_normal', '').split('?')[0];
                        console.log('Got avatar:', avatar);
                    }
                    // 提取名字
                    const nameMatch = html.match(/<a[^>]+class="profile-name"[^>]*>([^<]+)<\/a>/);
                    if (nameMatch && nameMatch[1]) {
                        name = nameMatch[1].trim();
                    }
                }
            } catch(e) {
                console.log('Nitter failed, using fallback');
            }
            
            currentUser = {
                username: username,
                name: name,
                avatar: avatar || 'https://api.dicebear.com/7.x/avataaars/svg?seed=' + username,
                links: 0,
                interactions: 0
            };
            localStorage.setItem('twitter_user', JSON.stringify(currentUser));
            showLoggedIn();
        }
        
        // 🚀 监听 auth 状态变化
        supabase.auth.onAuthStateChange((event, session) => {
            console.log('【SUPABASE】Auth event:', event);
            console.log('【SUPABASE】Session:', session);
            
            if (event === 'SIGNED_IN' && session) {
                // 从 Supabase session 提取 Twitter 真实信息
                const user = session.user;
                const metadata = user.user_metadata;
                
                console.log('【SUPABASE】User metadata:', metadata);
                
                // 提取头像和昵称
                let avatar = metadata.avatar_url || '';
                let username = metadata.preferred_username || metadata.full_name || user.email;
                
                // 处理高清头像
                avatar = avatar.replace('_normal', '');
                
                console.log('【SUPABASE】Got user:', { username, avatar });
                
                // 更新 currentUser
                currentUser = {
                    username: username,
                    name: username,
                    avatar: avatar || 'https://api.dicebear.com/7.x/avataaars/svg?seed=' + username,
                    links: 0,
                    interactions: 0
                };
                
                localStorage.setItem('twitter_user', JSON.stringify(currentUser));
                showLoggedIn();
            }
        });
        
        // 检查当前登录状态
        async function checkAuth() {
            const { data: { session } } = await supabase.auth.getSession();
            if (session) {
                const user = session.user;
                const metadata = user.user_metadata;
                let avatar = (metadata.avatar_url || '').replace('_normal', '');
                let username = metadata.preferred_username || metadata.full_name || user.email;
                
                currentUser = {
                    username: username,
                    name: username,
                    avatar: avatar || 'https://api.dicebear.com/7.x/avataaars/svg?seed=' + username,
                    links: 0,
                    interactions: 0
                };
                showLoggedIn();
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

        .card {

<body class="bg-grid text-slate-300" data-logged-in="{{ logged_in }}">
    <div class="max-w-2xl mx-auto px-5 py-8">
        <!-- Logo & Header -->
        <header class="flex items-center justify-between mb-8">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-indigo-500 to-purple-500 flex items-center justify-center">

        </header>
        
        <!-- Countdown -->
        <div class="card rounded-2xl p-5 mb-6">

    <script>
        let currentUser = { username: 'guest', avatar: 'https://api.dicebear.com/7.x/avataaars/svg?seed=guest', links: 0, interactions: 0 };
        let allTasks = [];
        let currentPage = 1;
        const TASKS_PER_PAGE = 20;
        
        function updateCountdown() {
            const now = new Date();
            const midnight = new Date(now);
            midnight.setHours(24, 0, 0, 0);
            const seconds = Math.floor((midnight - now) / 1000);
            const h = Math.floor(seconds / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            const s = seconds % 60;
            document.getElementById('timer').textContent = String(h).padStart(2,'0') + ':' + String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
        }
        setInterval(updateCountdown, 1000);
        updateCountdown();
        
        function init() {
            // 💥 诊断日志
            console.log("【MATRIX DIAGNOSTIC】Starting init...");
            
            // Check URL params for Twitter user
            const params = new URLSearchParams(window.location.search);
            const twitterUser = params.get('twitter_user');
            const twitterName = params.get('twitter_name');
            const twitterAvatar = params.get('twitter_avatar');
            
            console.log("【MATRIX DIAGNOSTIC】URL params:", { twitterUser, twitterName, twitterAvatar });
            
            if (twitterUser) {
                // 处理高清头像
                let avatarUrl = twitterAvatar || 'https://api.dicebear.com/7.x/avataaars/svg?seed=' + twitterUser;
                // 去掉 _normal 后缀
                avatarUrl = avatarUrl.replace('_normal', '');
                
                currentUser = {
                    username: twitterUser,
                    name: twitterName || twitterUser,
                    avatar: avatarUrl,
                    links: 0,
                    interactions: 0
                };
                
                console.log("【MATRIX DIAGNOSTIC】Setting user from Twitter:", currentUser);
                
                // Save to localStorage
                localStorage.setItem('twitter_user', JSON.stringify(currentUser));
                // Clean URL
                window.history.replaceState({}, document.title, '/');
            } else {
                // Check localStorage
                const saved = localStorage.getItem('twitter_user');
                if (saved) {
                    try {
                        currentUser = JSON.parse(saved);
                        console.log("【MATRIX DIAGNOSTIC】Loaded from localStorage:", currentUser);
                    } catch(e) {
                        console.log("【MATRIX DIAGNOSTIC】localStorage parse error:", e);
                    }
                }
            }
            
            console.log("【MATRIX DIAGNOSTIC】Final currentUser:", currentUser);
            showLoggedIn();
        }
        
        function login() {
            // 使用 OAuth 1.0a 登录
            window.location.href = '/auth/twitter';
        }
        
        async function loginWithUsername(username) {
            username = username.trim().replace('@', '');
            if (!username) return;
            
            console.log("【MATRIX DIAGNOSTIC】Fetching avatar for:", username);
            
            // 尝试获取真实头像
            try {
                // 方法1: 用 Twitter API
                const response = await fetch('https://api.twitter.com/2/users/by/username/' + username + '?user.fields=profile_image_url', {
                    headers: {
                        'Authorization': 'Bearer AAAAAAAAAAAAAAAAAAAAAI4%2FjkEAAAAA0t2L2XaNXLQa1uqy1W6Z8WkZ7k%3DqQ3m0gBzY0yJ0vG2pGxY9Z1N2XaNXLQa1uqy1W6Z8WkZ7k'
                    }
                });
                if (response.ok) {
                    const data = await response.json();
                    console.log("【MATRIX DIAGNOSTIC】Twitter API response:", data);
                    if (data.data) {
                        currentUser = {
                            username: data.data.username,
                            name: data.data.name || data.data.username,
                            avatar: data.data.profile_image_url.replace('_normal', ''),
                            links: 0,
                            interactions: 0
                        };
                        console.log("【MATRIX DIAGNOSTIC】Got real user:", currentUser);
                        localStorage.setItem('twitter_user', JSON.stringify(currentUser));
                        showLoggedIn();
                        return;
                    }
                }
            } catch (e) {
                console.log("【MATRIX DIAGNOSTIC】API error:", e);
            }
            
            // 回退：用 nitter 或其他
            try {
                const nitterResponse = await fetch('https://nitter.net/' + username);
                if (nitterResponse.ok) {
                    const html = await nitterResponse.text();
                    const avatarMatch = html.match(/"profile-image" src="([^"]+)"/);
                    if (avatarMatch) {
                        let avatar = avatarMatch[1].replace('_normal', '');
                        currentUser = {
                            username: username,
                            name: username,
                            avatar: avatar,
                            links: 0,
                            interactions: 0
                        };
                        localStorage.setItem('twitter_user', JSON.stringify(currentUser));
                        showLoggedIn();
                        return;
                    }
                }
            } catch (e2) {}
            
            // 最终回退：dicebear
            currentUser = {
                username: username,
                name: username,
                avatar: 'https://api.dicebear.com/7.x/avataaars/svg?seed=' + username,
                links: 0,
                interactions: 0
            };
            localStorage.setItem('twitter_user', JSON.stringify(currentUser));
            showLoggedIn();
        }
        
        async function loginWithUsername() {
            const username = document.getElementById('twitterInput').value.trim().replace('@', '');
            if (!username) {
                alert('请输入Twitter用户名');
                return;
            }
            
            // Try to get real avatar from Twitter
            try {
                // Use vxtwitter to get profile image
                const response = await fetch('https://api.vxtwitter.com/user/' + username);
                if (response.ok) {
                    const data = await response.json();
                    currentUser = {
                        username: data.user?.screen_name || username,
                        name: data.user?.name || username,
                        avatar: data.user?.profile_image_url?.replace('_normal', '') || 'https://api.dicebear.com/7.x/avataaars/svg?seed=' + username,
                        links: 0,
                        interactions: 0
                    };
                } else {
                    throw new Error('not found');
                }
            } catch (e) {
                // Fallback to dicebear
                currentUser = {
                    username: username,
                    name: username,
                    avatar: 'https://api.dicebear.com/7.x/avataaars/svg?seed=' + username,
                    links: 0,
                    interactions: 0
                };
            }
            
            localStorage.setItem('twitter_user', JSON.stringify(currentUser));
            showLoggedIn();
        }
        
        async function logout() {
            try {
                await fetch('/api/logout', { method: 'POST' });
                currentUser = null;
                document.getElementById('userInfo').innerHTML = '<button onclick="login()" class="px-4 py-2 bg-white/5 hover:bg-white/10 border border-white/10 rounded-lg text-sm font-medium text-white transition-all">Twitter 登录</button>';
                document.getElementById('mainContent').classList.add('hidden');
            } catch (e) {
                console.error(e);
            }
        }
        
        let userProgress = { interactions_done: 0, required: 3, is_unlocked: false };
        
        function showLoggedIn() {
            console.log('showLoggedIn called, currentUser:', currentUser);
            const userInfo = document.getElementById('userInfo');
            if (userInfo) {
                userInfo.innerHTML = '<div class="flex items-center gap-2"><img id="avatar-img" src="' + currentUser.avatar + '" class="w-8 h-8 rounded-full"><span id="username-text" class="text-white text-sm">@' + currentUser.username + '</span><button onclick="logout()" class="text-xs text-slate-500 hover:text-white">退出</button></div>';
                console.log('User info updated');
            } else {
                console.log('userInfo element not found!');
            }
            document.getElementById('mainContent').classList.remove('hidden');
            document.getElementById('linksSubmitted').textContent = currentUser.links;
            document.getElementById('interactionsDone').textContent = currentUser.interactions;
            loadTasks();
            loadLeaderboard();
        }
        
        async function loadTasks() {
            try {
                const res = await fetch('/api/tasks');
                allTasks = await res.json();
            } catch (e) {
                allTasks = [];
                for (let i = 1; i <= 50; i++) {
                    allTasks.push({id: i, username: 'user_' + i, avatar: 'https://api.dicebear.com/7.x/avataaars/svg?seed=' + i, link: '#', liked: false, retweeted: false, commented: false});
                }
            }
            currentPage = 1;
            renderTasks();
            renderPagination();
        }
        
        function renderTasks() {
            const start = (currentPage - 1) * TASKS_PER_PAGE;
            const tasks = allTasks.slice(start, start + TASKS_PER_PAGE);
            const list = document.getElementById('taskList');
            document.getElementById('taskCount');
            list.innerHTML = tasks.map(task => {
                const isDone = task.liked && task.retweeted && task.commented;
                return '<div class="card rounded-xl p-3 flex items-center justify-between fade-in"><div class="flex items-center gap-3"><img src="' + task.avatar + '" class="w-8 h-8 rounded-full"><a href="' + task.link + '" target="_blank" class="text-sm text-white hover:text-indigo-400">@' + task.username + '</a></div><a href="' + task.link + '" target="_blank" onclick="setTimeout(() => markAsDone(' + task.id + '), 1500)" class="px-4 py-1.5 rounded-lg text-xs font-medium ' + (isDone ? 'bg-white/5 text-slate-500' : 'bg-indigo-500/20 text-indigo-400 border border-indigo-500/30') + '">' + (isDone ? '✓ 已完成' : '去互动') + '</a></div>';
            }).join('');
        }
        
        function renderPagination() {
            const total = Math.ceil(allTasks.length / TASKS_PER_PAGE);
            const p = document.getElementById('pagination');
            if (total <= 1) { p.innerHTML = ''; return; }
            let html = '';
            
            // 上一页
            html += '<button onclick="goToPage(' + (currentPage - 1) + ')" ' + (currentPage === 1 ? 'disabled' : '') + ' class="w-8 h-8 rounded-lg text-xs ' + (currentPage === 1 ? 'opacity-30 cursor-not-allowed' : 'bg-white/5 text-slate-400 hover:bg-white/10') + '">‹</button>';
            
            for (let i = 1; i <= total; i++) {
                html += '<button onclick="goToPage(' + i + ')" class="w-8 h-8 rounded-lg text-xs ' + (i === currentPage ? 'bg-indigo-500 text-white' : 'bg-white/5 text-slate-400 hover:bg-white/10') + '">' + i + '</button>';
            }
            
            // 下一页
            html += '<button onclick="goToPage(' + (currentPage + 1) + ')" ' + (currentPage === total ? 'disabled' : '') + ' class="w-8 h-8 rounded-lg text-xs ' + (currentPage === total ? 'opacity-30 cursor-not-allowed' : 'bg-white/5 text-slate-400 hover:bg-white/10') + '">›</button>';
            
            p.innerHTML = html;
        }
        
        function goToPage(page) { 
            const total = Math.ceil(allTasks.length / TASKS_PER_PAGE);
            if (page < 1 || page > total) return;
            currentPage = page; 
            renderTasks(); 
            renderPagination(); 
        }
        
        async function loadLeaderboard() {
            try {
                const res = await fetch('/api/users');
                const users = await res.json();
                renderLeaderboard(users);
            } catch (e) { renderLeaderboard([]); }
        }
        
        function renderLeaderboard(users) {
            const medals = ['🥇', '🥈', '🥉'];
            document.getElementById('leaderboardList').innerHTML = users.map((u, i) => 
                '<div class="card rounded-lg p-3 flex items-center"><span class="w-6 ' + (i < 3 ? 'text-yellow-400' : 'text-slate-500') + '">' + (i < 3 ? medals[i] : i+1) + '</span><img src="' + u.avatar + '" class="w-6 h-6 rounded-full mx-3"><span class="flex-1 text-sm text-white">@' + u.username + '</span><span class="text-xs text-slate-500">' + u.interactions + ' 互动</span></div>'
            ).join('');
        }
        
        function markAsDone(taskId) {
            const task = allTasks.find(t => t.id === taskId);
            if (task) {
                task.liked = task.retweeted = task.commented = true;
                renderTasks();
                userProgress.interactions_done++;
                currentUser.interactions = (currentUser.interactions || 0) + 1;
                document.getElementById('interactionsDone').textContent = currentUser.interactions;
                document.getElementById('pendingNeeded').textContent = Math.max(0, userProgress.required - userProgress.interactions_done);
                const percent = Math.min(100, (userProgress.interactions_done / userProgress.required) * 100);
                document.getElementById('progressBar').style.width = percent + '%';
                document.getElementById('progressText').textContent = userProgress.interactions_done + '/' + userProgress.required;
                
                if (userProgress.interactions_done >= userProgress.required) {
                    userProgress.is_unlocked = true;
                    document.getElementById('linkInput').disabled = false;
                    document.getElementById('linkInput').placeholder = '粘贴你的Twitter链接...';
                    document.getElementById('submitBtn').disabled = false;
                    document.getElementById('submitBtn').classList.remove('bg-white/5', 'text-slate-400', 'cursor-not-allowed');
                    document.getElementById('submitBtn').classList.add('bg-indigo-500', 'text-white', 'btn-glow');
                    document.getElementById('unlockMessage').classList.remove('hidden');
                    document.getElementById('progressHint').textContent = '✓ 已解锁提交功能';
                }
            }
        }
        
        function submitLink() {
            const link = document.getElementById('linkInput').value;
            if (!link) { alert('请输入链接'); return; }
            const already = allTasks.some(t => t.username === currentUser.username);
            if (already) { alert('今日已提交'); return; }
            
            allTasks.unshift({id: allTasks.length + 1, username: currentUser.username, avatar: currentUser.avatar, link: link, liked: false, retweeted: false, commented: false});
            currentUser.links = (currentUser.links || 0) + 1;
            document.getElementById('linksSubmitted').textContent = currentUser.links;
            document.getElementById('linkInput').value = '';
            renderTasks();
            renderPagination();
            alert('提交成功！');
        }
        
        init();
    </script>
</body>
</html>
