<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>24hclub 打卡台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --bg-dark: #0B0F19; --bg-card: #131B2A; --cyan: #22d3ee; }
        body { background-color: var(--bg-dark); color: white; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); }
        .text-gradient { background: linear-gradient(to right, #22d3ee, #3b82f6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .font-mono { font-family: 'Courier New', monospace; }
    </style>
</head>
<body class="bg-[#0B0F19] text-white min-h-screen">
    <div class="max-w-3xl mx-auto px-5 py-6">
        <!-- 核心模块2: 紧迫感倒计时 -->
        <div id="countdown" class="glass rounded-xl p-4 mb-4 border border-red-500/30 text-center">
            <div class="text-red-500 text-sm font-semibold tracking-wider">
                ⏰ 距离今日任务重置还有：
            </div>
            <div id="timer" class="text-3xl font-mono font-bold text-red-500 mt-1">
                00:00:00
            </div>
            <div class="text-gray-500 text-xs mt-1">
                UTC 00:00 重置 (北京时间 08:00)
            </div>
        </div>
        
        <!-- Header -->
        <header class="flex items-center justify-between py-5 border-b border-gray-800">
            <h1 class="text-2xl font-bold bg-gradient-to-r from-cyan-400 to-green-400 bg-clip-text text-transparent">
                24hclub
            </h1>
            <div id="userInfo">
                <a href="/auth/twitter" class="px-4 py-2 bg-[#1DA1F2] text-white rounded-lg font-semibold">
                    Twitter 登录
                </a>
            </div>
        </header>
        
        <div id="mainContent" class="hidden">
            <!-- Stats Cards -->
            <div class="grid grid-cols-3 gap-4 my-5">
                <div class="glass rounded-2xl p-6 border border-gray-800">
                    <div class="text-4xl font-bold text-cyan-400" id="linksSubmitted">0</div>
                    <div class="text-gray-400 text-sm mt-2">📤 今日提交</div>
                </div>
                <div class="glass rounded-2xl p-6 border border-gray-800">
                    <div class="text-4xl font-bold text-gradient" id="interactionsDone">0</div>
                    <div class="text-gray-400 text-sm mt-2">💬 已完成互动</div>
                </div>
                <div class="glass rounded-2xl p-6 border border-red-500/50 glow-red" id="pendingCard">
                    <div class="text-4xl font-bold text-red-500" id="pendingNeeded">5</div>
                    <div class="text-gray-400 text-sm mt-2">⏳ 还需互动</div>
                </div>
            </div>
            
            <!-- Submit Section -->
            <div class="glass rounded-2xl p-5 my-5">
                <h3 class="text-lg font-semibold mb-4">📤 提交你的链接</h3>
                <div id="submitForm" class="flex gap-3">
                    <input type="text" id="linkInput" 
                        class="flex-1 px-4 py-3 bg-[#0B0F19] border border-cyan-500/50 rounded-lg text-white placeholder-gray-500 focus:outline-none focus:border-cyan-400"
                        placeholder="粘贴你的Twitter链接...">
                    <button onclick="submitLink()" 
                        class="px-6 py-3 bg-cyan-500 text-black font-semibold rounded-lg hover:bg-cyan-400 transition-colors">
                        提交
                    </button>
                </div>
                <p id="warningMsg" class="hidden mt-3 text-red-500 text-sm">
                    ⚠️ 需要先完成 <span id="pendingNum">5</span> 次互动才能提交链接
                </p>
                <p id="alreadySubmitted" class="hidden mt-3 text-yellow-500 text-sm">
                    ⚠️ 今日已提交过链接，每人每天仅限1条
                </p>
            </div>
            
            <!-- Task List -->
            <div class="my-5">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="text-lg font-semibold">📋 今日任务池</h3>
                    <span class="text-gray-400" id="taskCount">0 个任务</span>
                </div>
                <div id="taskList" class="space-y-3"></div>
            </div>
        </div>
        
        <!-- Leaderboard -->
        <div class="mt-8">
            <h3 class="text-lg font-semibold mb-4">🏆 今日贡献榜</h3>
            <div id="leaderboardList" class="space-y-2"></div>
        </div>
        
        <footer class="text-center py-6 text-gray-500 text-sm">
            24hclub Task Tracker
        </footer>
    </div>
    
    <script>
        let currentUser = null;
        let tasks = [];
        let userSubmittedToday = false;
        
        // 核心模块2: 倒计时
        async function updateCountdown() {
            try {
                const res = await fetch('/api/countdown');
                const data = await res.json();
                const seconds = data.seconds;
                
                const hours = Math.floor(seconds / 3600);
                const mins = Math.floor((seconds % 3600) / 60);
                const secs = seconds % 60;
                
                document.getElementById('timer').textContent = 
                    `${String(hours).padStart(2, '0')}:${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
            } catch (e) {
                // Fallback
            }
        }
        
        setInterval(updateCountdown, 1000);
        updateCountdown();
        
        async function init() {
            try {
                const res = await fetch('/api/user');
                currentUser = await res.json();
                showLoggedIn(currentUser);
            } catch (e) {
                currentUser = {id: 1, username: 'crypto_king', avatar: 'https://picsum.photos/100', links: 12, interactions: 45};
                showLoggedIn(currentUser);
            }
        }
        
        function showLoggedIn(user) {
            document.getElementById('userInfo').innerHTML = `
                <img src="${user.avatar}" class="w-10 h-10 rounded-full">
                <span class="font-semibold">@${user.username}</span>
            `;
            document.getElementById('mainContent').classList.remove('hidden');
            
            document.getElementById('linksSubmitted').textContent = user.links;
            document.getElementById('interactionsDone').textContent = user.interactions;
            
            const pending = Math.max(0, 5 - user.interactions);
            document.getElementById('pendingNeeded').textContent = pending;
            document.getElementById('pendingNum').textContent = pending;
            
            if (pending > 0) {
                document.getElementById('pendingCard').classList.add('glow-red', 'border-red-500/50');
            }
            
            if (user.interactions >= 5 && !userSubmittedToday) {
                document.getElementById('submitForm').classList.remove('hidden');
                document.getElementById('warningMsg').classList.add('hidden');
                document.getElementById('alreadySubmitted').classList.add('hidden');
            } else if (userSubmittedToday) {
                document.getElementById('submitForm').classList.add('hidden');
                document.getElementById('alreadySubmitted').classList.remove('hidden');
            } else {
                document.getElementById('submitForm').classList.add('hidden');
                document.getElementById('warningMsg').classList.remove('hidden');
            }
            
            loadTasks();
            loadLeaderboard();
        }
        
        async function loadTasks() {
            try {
                const res = await fetch('/api/tasks');
                tasks = await res.json();
                renderTasks(tasks);
            } catch (e) {
                tasks = [
                    {id: 1, userId: 1, username: 'crypto_king', avatar: 'https://picsum.photos/100', link: 'https://x.com/crypto_king/status/123456789', liked: true, retweeted: false, commented: true},
                    {id: 2, userId: 2, username: 'defi_girl', avatar: 'https://picsum.photos/101', link: 'https://x.com/defi_girl/status/123456788', liked: false, retweeted: true, commented: false},
                    {id: 3, userId: 3, username: 'whale_watcher', avatar: 'https://picsum.photos/102', link: 'https://x.com/whale_watcher/status/123456787', liked: true, retweeted: true, commented: false},
                ];
                renderTasks(tasks);
            }
        }
        
        async function loadLeaderboard() {
            try {
                const res = await fetch('/api/users');
                const users = await res.json();
                renderLeaderboard(users);
            } catch (e) {
                renderLeaderboard([]);
            }
        }
        
        function renderTasks(tasks) {
            const list = document.getElementById('taskList');
            document.getElementById('taskCount').textContent = tasks.length + ' 个任务';
            
            list.innerHTML = tasks.map(task => {
                const isDone = task.liked && task.retweeted && task.commented;
                return `
                <div class="bg-[#131B2A] rounded-xl p-4 flex items-center justify-between border border-gray-800 hover:border-cyan-500/50 transition-colors">
                    <div class="flex items-center gap-3 flex-1 min-w-0">
                        <img src="${task.avatar}" class="w-9 h-9 rounded-full border border-gray-600">
                        <a href="${task.link}" target="_blank" class="text-gray-300 truncate hover:text-cyan-400">
                            @${task.username} 的推文
                        </a>
                    </div>
                    <a href="${task.link}" target="_blank" 
                        class="${isDone 
                            ? 'bg-gray-800/50 text-gray-500 border border-gray-700 px-6 py-2 rounded-lg font-mono text-sm cursor-not-allowed' 
                            : 'bg-cyan-500/10 text-cyan-400 border border-cyan-500/50 hover:bg-cyan-500/20 px-6 py-2 rounded-lg font-mono text-sm uppercase tracking-wider transition-all'}"
                        onclick="${isDone ? '' : `markAsDone(event, ${task.id})`}">
                        ${isDone ? 'DONE' : 'ACTION'}
                    </a>
                </div>
            `}).join('');
        }
        
        function renderLeaderboard(users) {
            const list = document.getElementById('leaderboardList');
            const medals = ['🥇', '🥈', '🥉'];
            
            list.innerHTML = users.map((u, i) => `
                <div class="bg-[#131B2A] rounded-lg p-3 flex items-center ${u.interactions < 5 ? 'border border-red-500/30' : ''}">
                    <span class="w-8 text-lg font-bold ${i === 0 ? 'text-yellow-400' : (i === 1 ? 'text-gray-300' : (i === 2 ? 'text-orange-400' : 'text-gray-500'))}">
                        ${i < 3 ? medals[i] : (i + 1)}
                    </span>
                    <img src="${u.avatar}" class="w-8 h-8 rounded-full mr-3">
                    <span class="flex-1 ${u.interactions < 5 ? 'text-red-500 font-semibold' : ''}">@${u.username}</span>
                    <div class="text-right text-sm ${u.interactions < 5 ? 'text-red-500' : 'text-gray-400'}">
                        <span>📤${u.links}</span>
                        <span class="ml-3">💬${u.interactions}</span>
                    </div>
                </div>
            `).join('');
        }
        
        async function submitLink() {
            const link = document.getElementById('linkInput').value;
            if (!link) {
                alert('请输入链接');
                return;
            }
            
            // 核心模块3: 防刷屏限制
            try {
                const res = await fetch('/api/submit', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        link: link,
                        username: currentUser?.username || 'demo_user'
                    })
                });
                const data = await res.json();
                
                if (data.success) {
                    alert('提交成功！');
                    userSubmittedToday = true;
                    loadTasks();
                    loadLeaderboard();
                } else {
                    alert(data.error || '提交失败');
                    if (data.error === '今日已提交') {
                        userSubmittedToday = true;
                        document.getElementById('submitForm').classList.add('hidden');
                        document.getElementById('alreadySubmitted').classList.remove('hidden');
                    }
                }
            } catch (e) {
                alert('Demo模式 - 提交功能暂时禁用');
            }
        }
        
        function markAsDone(event, taskId) {
            setTimeout(() => {
                const task = tasks.find(t => t.id === taskId);
                if (task) {
                    task.liked = true;
                    task.retweeted = true;
                    task.commented = true;
                    renderTasks(tasks);
                }
            }, 2000);
        }
        
        init();
    </script>
</body>
</html>
