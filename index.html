<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>24hclub 打卡台</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0f; color: #fff; min-height: 100vh;
        }
        .container { max-width: 800px; margin: 0 auto; padding: 20px; }
        
        .header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 20px 0; border-bottom: 1px solid #222;
        }
        .logo { font-size: 1.5em; font-weight: 700; background: linear-gradient(90deg, #00f0ff, #00ff88); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .user-info { display: flex; align-items: center; gap: 12px; }
        .avatar { width: 40px; height: 40px; border-radius: 50%; }
        .username { font-weight: 600; }
        
        .login-btn {
            padding: 10px 20px; background: #1da1f2; color: #fff; 
            border: none; border-radius: 8px; font-weight: 600; cursor: pointer;
            text-decoration: none; display: inline-block;
        }
        
        .stats {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin: 20px 0;
        }
        .stat-card {
            background: #16161a; padding: 20px; border-radius: 12px; text-align: center;
        }
        .stat-num { font-size: 2em; font-weight: 700; color: #00f0ff; }
        .stat-num.warning { color: #ff3366; }
        .stat-label { color: #888; font-size: 0.9em; margin-top: 5px; }
        
        .submit-section {
            background: #16161a; padding: 20px; border-radius: 12px; margin: 20px 0;
        }
        .submit-section h3 { margin-bottom: 15px; }
        .submit-row { display: flex; gap: 10px; }
        .submit-input {
            flex: 1; padding: 15px; background: #0a0a0f; border: 1px solid #00f0ff;
            border-radius: 8px; color: #fff; font-size: 1em;
        }
        .submit-btn {
            padding: 15px 30px; background: #00f0ff; border: none; 
            border-radius: 8px; color: #000; font-weight: 600; cursor: pointer;
        }
        .submit-btn:disabled { background: #333; color: #666; cursor: not-allowed; }
        
        .task-list { margin: 20px 0; }
        .task-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .task-item {
            background: #16161a; padding: 15px; border-radius: 12px; margin-bottom: 10px;
            display: flex; align-items: center; justify-content: space-between;
        }
        .task-user { display: flex; align-items: center; gap: 10px; flex: 1; min-width: 0; }
        .task-avatar { width: 36px; height: 36px; border-radius: 50%; flex-shrink: 0; }
        .task-link {
            color: #00f0ff; text-decoration: none; font-size: 0.85em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        
        /* Single button styles */
        .action-btn {
            padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 0.9em; white-space: nowrap;
            background: linear-gradient(90deg, #00f0ff, #00ff88); color: #000;
        }
        .action-btn:hover { opacity: 0.9; }
        .action-btn.done { 
            background: #1a1a1a; color: #00ff88; border: 1px solid #00ff88;
        }
        
        .leaderboard { margin-top: 30px; }
        .leaderboard h3 { margin-bottom: 15px; }
        .rank-item {
            display: flex; align-items: center; padding: 12px; background: #16161a;
            border-radius: 8px; margin-bottom: 8px;
        }
        .rank-num { width: 40px; font-weight: 700; font-size: 1.2em; }
        .rank-num.gold { color: #ffd700; }
        .rank-num.silver { color: #c0c0c0; }
        .rank-num.bronze { color: #cd7f32; }
        .rank-icon { font-size: 1.3em; margin-right: 5px; }
        .rank-avatar { width: 30px; height: 30px; border-radius: 50%; margin-right: 10px; }
        .rank-name { flex: 1; }
        .rank-stats { text-align: right; font-size: 0.85em; color: #888; }
        .rank-stats .submit-icon { margin-right: 8px; }
        .rank-stats .interact-icon { margin-left: 8px; }
        .rank-low { color: #ff3366; font-weight: 600; }
        
        .warning { color: #ff3366; font-size: 0.9em; margin-top: 10px; }
        .warning-icon { margin-right: 5px; }
        .footer { text-align: center; padding: 20px; color: #666; font-size: 0.85em; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">24hclub</div>
            <div class="user-info" id="userInfo">
                <a href="/auth/twitter" class="login-btn">Twitter 登录</a>
            </div>
        </div>
        
        <div id="mainContent" style="display: none;">
            <div class="stats">
                <div class="stat-card">
                    <div class="stat-num" id="linksSubmitted">0</div>
                    <div class="stat-label">📤 今日提交</div>
                </div>
                <div class="stat-card">
                    <div class="stat-num" id="interactionsDone">0</div>
                    <div class="stat-label">💬 已完成互动</div>
                </div>
                <div class="stat-card">
                    <div class="stat-num" id="pendingNeeded">5</div>
                    <div class="stat-label">⏳ 还需互动</div>
                </div>
            </div>
            
            <div class="submit-section">
                <h3>📤 提交你的链接</h3>
                <div id="submitForm">
                    <div class="submit-row">
                        <input type="text" id="linkInput" class="submit-input" placeholder="粘贴你的Twitter链接...">
                        <button class="submit-btn" onclick="submitLink()">提交</button>
                    </div>
                </div>
                <p class="warning" id="warningMsg" style="display: none;">
                    <span class="warning-icon">⚠️</span>需要先完成 <span id="pendingNum">5</span> 次互动才能提交链接
                </p>
            </div>
            
            <div class="task-list">
                <div class="task-header">
                    <h3>📋 今日任务池</h3>
                    <span style="color: #888;" id="taskCount">0 个任务</span>
                </div>
                <div id="taskList"></div>
            </div>
        </div>
        
        <div class="leaderboard">
            <h3>🏆 贡献排行榜</h3>
            <div id="leaderboardList"></div>
        </div>
        
        <div class="footer">24hclub Task Tracker</div>
    </div>
    
    <script>
        let currentUser = null;
        let tasks = [];
        
        async function init() {
            try {
                const res = await fetch('/api/user');
                currentUser = await res.json();
                showLoggedIn(currentUser);
            } catch (e) {
                console.log('Using demo mode');
                currentUser = {id: 1, username: 'crypto_king', avatar: 'https://picsum.photos/100', links: 12, interactions: 45};
                showLoggedIn(currentUser);
            }
        }
        
        function showLoggedIn(user) {
            document.getElementById('userInfo').innerHTML = `
                <img src="${user.avatar}" class="avatar">
                <span class="username">@${user.username}</span>
            `;
            document.getElementById('mainContent').style.display = 'block';
            
            document.getElementById('linksSubmitted').textContent = user.links;
            document.getElementById('interactionsDone').textContent = user.interactions;
            
            const pending = Math.max(0, 5 - user.interactions);
            document.getElementById('pendingNeeded').textContent = pending;
            document.getElementById('pendingNum').textContent = pending;
            
            if (pending > 0) {
                document.getElementById('pendingNeeded').classList.add('warning');
            }
            
            if (user.interactions >= 5) {
                document.getElementById('submitForm').style.display = 'block';
                document.getElementById('warningMsg').style.display = 'none';
            } else {
                document.getElementById('submitForm').style.display = 'none';
                document.getElementById('warningMsg').style.display = 'block';
            }
            
            loadTasks();
            loadLeaderboard();
        }
        
        async function loadTasks() {
            try {
                const res = await fetch('/api/tasks');
                tasks = await res.json();
                renderTasks(tasks);
            } catch (e) {
                tasks = [
                    {id: 1, userId: 1, username: 'crypto_king', avatar: 'https://picsum.photos/100', link: 'https://x.com/crypto_king/status/123456789', liked: true, retweeted: false, commented: true},
                    {id: 2, userId: 2, username: 'defi_girl', avatar: 'https://picsum.photos/101', link: 'https://x.com/defi_girl/status/123456788', liked: false, retweeted: true, commented: false},
                    {id: 3, userId: 3, username: 'whale_watcher', avatar: 'https://picsum.photos/102', link: 'https://x.com/whale_watcher/status/123456787', liked: true, retweeted: true, commented: false},
                ];
                renderTasks(tasks);
            }
        }
        
        async function loadLeaderboard() {
            try {
                const res = await fetch('/api/users');
                const users = await res.json();
                renderLeaderboard(users);
            } catch (e) {
                renderLeaderboard([]);
            }
        }
        
        function renderTasks(tasks) {
            const list = document.getElementById('taskList');
            document.getElementById('taskCount').textContent = tasks.length + ' 个任务';
            
            list.innerHTML = tasks.map(task => {
                const isDone = task.liked && task.retweeted && task.commented;
                return `
                <div class="task-item">
                    <div class="task-user">
                        <img src="${task.avatar}" class="task-avatar">
                        <a href="${task.link}" target="_blank" class="task-link">@${task.username} 的推文</a>
                    </div>
                    <a href="${task.link}" target="_blank" class="action-btn ${isDone ? 'done' : ''}" onclick="markAsDone(event, ${task.id})">
                        ${isDone ? '✓ 已完成' : '去互动 →'}
                    </a>
                </div>
            `}).join('');
        }
        
        function renderLeaderboard(users) {
            const list = document.getElementById('leaderboardList');
            const medals = ['🥇', '🥈', '🥉'];
            
            list.innerHTML = users.map((u, i) => `
                <div class="rank-item">
                    <span class="rank-num ${i === 0 ? 'gold' : (i === 1 ? 'silver' : (i === 2 ? 'bronze' : ''))}">
                        ${i < 3 ? medals[i] : (i + 1)}
                    </span>
                    <img src="${u.avatar}" class="rank-avatar">
                    <span class="rank-name ${u.interactions < 5 ? 'rank-low' : ''}">@${u.username}</span>
                    <div class="rank-stats" style="${u.interactions < 5 ? 'color: #ff3366;' : ''}">
                        <span class="submit-icon">📤${u.links}</span>
                        <span class="interact-icon">💬${u.interactions}</span>
                    </div>
                </div>
            `).join('');
        }
        
        function markAsDone(event, taskId) {
            // Mark as done after user clicks
            setTimeout(() => {
                const task = tasks.find(t => t.id === taskId);
                if (task) {
                    task.liked = true;
                    task.retweeted = true;
                    task.commented = true;
                    renderTasks(tasks);
                }
            }, 2000); // Give user time to interact
        }
        
        function submitLink() {
            const link = document.getElementById('linkInput').value;
            if (!link) {
                alert('请输入链接');
                return;
            }
            alert('Demo模式 - 提交功能暂时禁用');
        }
        
        init();
    </script>
</body>
</html>
