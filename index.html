<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>24h 交互矩阵</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Outfit', sans-serif; }
        
        body {
            background: #0a0a0f;
            min-height: 100vh;
        }
        
        .bg-grid {
            background-image: 
                linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 40px 40px;
        }
        
        .card {
            background: linear-gradient(135deg, rgba(255,255,255,0.03) 0%, rgba(255,255,255,0.01) 100%);
            border: 1px solid rgba(255,255,255,0.06);
            backdrop-filter: blur(20px);
        }
        
        .card:hover {
            border-color: rgba(99, 102, 241, 0.3);
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.05) 0%, rgba(255,255,255,0.02) 100%);
        }
        
        .glow {
            box-shadow: 0 0 40px rgba(99, 102, 241, 0.15);
        }
        
        .text-gradient {
            background: linear-gradient(135deg, #818cf8 0%, #c084fc 50%, #f472b6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .btn-glow:hover {
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.4);
        }
        
        .pulse-dot {
            animation: pulse-dot 2s ease-in-out infinite;
        }
        
        @keyframes pulse-dot {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        input:focus {
            outline: none;
            border-color: #6366f1;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }
    </style>
</head>
<body class="bg-grid text-slate-300">
    <div class="max-w-2xl mx-auto px-5 py-8">
        <!-- Logo & Header -->
        <header class="flex items-center justify-between mb-8">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-indigo-500 to-purple-500 flex items-center justify-center">
                    <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/>
                    </svg>
                </div>
                <h1 class="text-xl font-semibold text-white">24h 交互矩阵</h1>
            </div>
            <div id="userInfo">
                <button onclick="login()" class="px-4 py-2 bg-white/5 hover:bg-white/10 border border-white/10 rounded-lg text-sm font-medium text-white transition-all">Twitter 登录</button>
            </div>
        </header>
        
        <!-- Countdown -->
        <div class="card rounded-2xl p-5 mb-6">
            <div class="flex items-center justify-between">
                <div>
                    <div class="text-xs text-slate-500 uppercase tracking-wider mb-1">距离重置</div>
                    <div class="text-4xl font-light text-white" id="timer">00:00:00</div>
                </div>
                <div class="w-12 h-12 rounded-full bg-indigo-500/20 flex items-center justify-center">
                    <svg class="w-6 h-6 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
                    </svg>
                </div>
            </div>
        </div>
        
        <div id="mainContent" class="hidden">
            <!-- Progress -->
            <div class="card rounded-2xl p-5 mb-6">
                <div class="flex items-center justify-between mb-3">
                    <span class="text-sm text-slate-400">解锁进度</span>
                    <span class="text-sm font-medium text-white" id="progressText">0/3</span>
                </div>
                <div class="h-1.5 bg-white/5 rounded-full overflow-hidden">
                    <div id="progressBar" class="h-full bg-gradient-to-r from-indigo-500 to-purple-500 rounded-full transition-all duration-500" style="width: 0%"></div>
                </div>
                <p class="text-xs text-slate-500 mt-3" id="progressHint">完成 3 次互动解锁提交功能</p>
            </div>
            
            <!-- Stats -->
            <div class="grid grid-cols-3 gap-3 mb-6">
                <div class="card rounded-xl p-4 text-center">
                    <div class="text-2xl font-semibold text-white" id="linksSubmitted">0</div>
                    <div class="text-xs text-slate-500 mt-1">推文总数</div>
                </div>
                <div class="card rounded-xl p-4 text-center">
                    <div class="text-2xl font-semibold text-white" id="interactionsDone">0</div>
                    <div class="text-xs text-slate-500 mt-1">已完成互动</div>
                </div>
                <div class="card rounded-xl p-4 text-center">
                    <div class="text-2xl font-semibold text-purple-400" id="pendingNeeded">3</div>
                    <div class="text-xs text-slate-500 mt-1">还需互动</div>
                </div>
            </div>
            
            <!-- Submit -->
            <div class="card rounded-2xl p-5 mb-6">
                <h3 class="text-sm font-medium text-slate-400 mb-3">提交你的链接</h3>
                <div class="flex gap-2" id="submitForm">
                    <input type="text" id="linkInput" class="flex-1 px-4 py-3 bg-white/5 border border-white/10 rounded-xl text-white text-sm placeholder-slate-500" placeholder="先完成互动任务来解锁..." disabled>
                    <button id="submitBtn" onclick="submitLink()" class="px-5 py-3 bg-white/5 border border-white/10 rounded-xl text-slate-400 text-sm font-medium cursor-not-allowed" disabled>提交</button>
                </div>
                <p id="unlockMessage" class="hidden text-center text-sm text-indigo-400 mt-3">✓ 已解锁提交功能</p>
            </div>
            
            <!-- Tasks -->
            <div class="mb-6">
                <h3 class="text-sm font-medium text-slate-400 mb-3">今日任务池</h3>
                <div id="taskList" class="space-y-2"></div>
                <div id="pagination" class="flex justify-center gap-1 mt-4"></div>
            </div>
        </div>
        
        <!-- Leaderboard -->
        <div>
            <h3 class="text-sm font-medium text-slate-400 mb-3">贡献榜</h3>
            <div id="leaderboardList" class="space-y-2"></div>
        </div>
        
        <footer class="text-center py-8 text-slate-600 text-xs">
            24h 交互矩阵
        </footer>
    </div>
    
    <script>
        let currentUser = null;
        let allTasks = [];
        let currentPage = 1;
        const TASKS_PER_PAGE = 20;
        
        function updateCountdown() {
            const now = new Date();
            const midnight = new Date(now);
            midnight.setHours(24, 0, 0, 0);
            const seconds = Math.floor((midnight - now) / 1000);
            const h = Math.floor(seconds / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            const s = seconds % 60;
            document.getElementById('timer').textContent = String(h).padStart(2,'0') + ':' + String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
        }
        setInterval(updateCountdown, 1000);
        updateCountdown();
        
        async function init() {
            // Auto login on page load
            try {
                const res = await fetch('/api/login', { method: 'POST' });
                const data = await res.json();
                currentUser = data.user;
            } catch (e) {
                currentUser = {username: 'guest', avatar: 'https://api.dicebear.com/7.x/avataaars/svg?seed=guest', links: 0, interactions: 0};
            }
            showLoggedIn();
        }
        
        async function login() {
            // Already auto-logged in
            showLoggedIn();
        }
        
        async function logout() {
            try {
                await fetch('/api/logout', { method: 'POST' });
                currentUser = null;
                document.getElementById('userInfo').innerHTML = '<button onclick="login()" class="px-4 py-2 bg-white/5 hover:bg-white/10 border border-white/10 rounded-lg text-sm font-medium text-white transition-all">Twitter 登录</button>';
                document.getElementById('mainContent').classList.add('hidden');
            } catch (e) {
                console.error(e);
            }
        }
        
        let userProgress = { interactions_done: 0, required: 3, is_unlocked: false };
        
        function showLoggedIn() {
            document.getElementById('userInfo').innerHTML = '<div class="flex items-center gap-2"><img src="' + currentUser.avatar + '" class="w-8 h-8 rounded-full"><span class="text-white text-sm">@' + currentUser.username + '</span><button onclick="logout()" class="text-xs text-slate-500 hover:text-white">退出</button></div>';
            document.getElementById('mainContent').classList.remove('hidden');
            document.getElementById('linksSubmitted').textContent = currentUser.links;
            document.getElementById('interactionsDone').textContent = currentUser.interactions;
            loadTasks();
            loadLeaderboard();
        }
        
        async function loadTasks() {
            try {
                const res = await fetch('/api/tasks');
                allTasks = await res.json();
            } catch (e) {
                allTasks = [];
                for (let i = 1; i <= 50; i++) {
                    allTasks.push({id: i, username: 'user_' + i, avatar: 'https://api.dicebear.com/7.x/avataaars/svg?seed=' + i, link: '#', liked: false, retweeted: false, commented: false});
                }
            }
            currentPage = 1;
            renderTasks();
            renderPagination();
        }
        
        function renderTasks() {
            const start = (currentPage - 1) * TASKS_PER_PAGE;
            const tasks = allTasks.slice(start, start + TASKS_PER_PAGE);
            const list = document.getElementById('taskList');
            document.getElementById('taskCount');
            list.innerHTML = tasks.map(task => {
                const isDone = task.liked && task.retweeted && task.commented;
                return '<div class="card rounded-xl p-3 flex items-center justify-between fade-in"><div class="flex items-center gap-3"><img src="' + task.avatar + '" class="w-8 h-8 rounded-full"><a href="' + task.link + '" target="_blank" class="text-sm text-white hover:text-indigo-400">@' + task.username + '</a></div><a href="' + task.link + '" target="_blank" onclick="setTimeout(() => markAsDone(' + task.id + '), 1500)" class="px-4 py-1.5 rounded-lg text-xs font-medium ' + (isDone ? 'bg-white/5 text-slate-500' : 'bg-indigo-500/20 text-indigo-400 border border-indigo-500/30') + '">' + (isDone ? '✓ 已完成' : '去互动') + '</a></div>';
            }).join('');
        }
        
        function renderPagination() {
            const total = Math.ceil(allTasks.length / TASKS_PER_PAGE);
            const p = document.getElementById('pagination');
            if (total <= 1) { p.innerHTML = ''; return; }
            let html = '';
            
            // 上一页
            html += '<button onclick="goToPage(' + (currentPage - 1) + ')" ' + (currentPage === 1 ? 'disabled' : '') + ' class="w-8 h-8 rounded-lg text-xs ' + (currentPage === 1 ? 'opacity-30 cursor-not-allowed' : 'bg-white/5 text-slate-400 hover:bg-white/10') + '">‹</button>';
            
            for (let i = 1; i <= total; i++) {
                html += '<button onclick="goToPage(' + i + ')" class="w-8 h-8 rounded-lg text-xs ' + (i === currentPage ? 'bg-indigo-500 text-white' : 'bg-white/5 text-slate-400 hover:bg-white/10') + '">' + i + '</button>';
            }
            
            // 下一页
            html += '<button onclick="goToPage(' + (currentPage + 1) + ')" ' + (currentPage === total ? 'disabled' : '') + ' class="w-8 h-8 rounded-lg text-xs ' + (currentPage === total ? 'opacity-30 cursor-not-allowed' : 'bg-white/5 text-slate-400 hover:bg-white/10') + '">›</button>';
            
            p.innerHTML = html;
        }
        
        function goToPage(page) { 
            const total = Math.ceil(allTasks.length / TASKS_PER_PAGE);
            if (page < 1 || page > total) return;
            currentPage = page; 
            renderTasks(); 
            renderPagination(); 
        }
        
        async function loadLeaderboard() {
            try {
                const res = await fetch('/api/users');
                const users = await res.json();
                renderLeaderboard(users);
            } catch (e) { renderLeaderboard([]); }
        }
        
        function renderLeaderboard(users) {
            const medals = ['🥇', '🥈', '🥉'];
            document.getElementById('leaderboardList').innerHTML = users.map((u, i) => 
                '<div class="card rounded-lg p-3 flex items-center"><span class="w-6 ' + (i < 3 ? 'text-yellow-400' : 'text-slate-500') + '">' + (i < 3 ? medals[i] : i+1) + '</span><img src="' + u.avatar + '" class="w-6 h-6 rounded-full mx-3"><span class="flex-1 text-sm text-white">@' + u.username + '</span><span class="text-xs text-slate-500">' + u.interactions + ' 互动</span></div>'
            ).join('');
        }
        
        function markAsDone(taskId) {
            const task = allTasks.find(t => t.id === taskId);
            if (task) {
                task.liked = task.retweeted = task.commented = true;
                renderTasks();
                userProgress.interactions_done++;
                currentUser.interactions = (currentUser.interactions || 0) + 1;
                document.getElementById('interactionsDone').textContent = currentUser.interactions;
                document.getElementById('pendingNeeded').textContent = Math.max(0, userProgress.required - userProgress.interactions_done);
                const percent = Math.min(100, (userProgress.interactions_done / userProgress.required) * 100);
                document.getElementById('progressBar').style.width = percent + '%';
                document.getElementById('progressText').textContent = userProgress.interactions_done + '/' + userProgress.required;
                
                if (userProgress.interactions_done >= userProgress.required) {
                    userProgress.is_unlocked = true;
                    document.getElementById('linkInput').disabled = false;
                    document.getElementById('linkInput').placeholder = '粘贴你的Twitter链接...';
                    document.getElementById('submitBtn').disabled = false;
                    document.getElementById('submitBtn').classList.remove('bg-white/5', 'text-slate-400', 'cursor-not-allowed');
                    document.getElementById('submitBtn').classList.add('bg-indigo-500', 'text-white', 'btn-glow');
                    document.getElementById('unlockMessage').classList.remove('hidden');
                    document.getElementById('progressHint').textContent = '✓ 已解锁提交功能';
                }
            }
        }
        
        function submitLink() {
            const link = document.getElementById('linkInput').value;
            if (!link) { alert('请输入链接'); return; }
            const already = allTasks.some(t => t.username === currentUser.username);
            if (already) { alert('今日已提交'); return; }
            
            allTasks.unshift({id: allTasks.length + 1, username: currentUser.username, avatar: currentUser.avatar, link: link, liked: false, retweeted: false, commented: false});
            currentUser.links = (currentUser.links || 0) + 1;
            document.getElementById('linksSubmitted').textContent = currentUser.links;
            document.getElementById('linkInput').value = '';
            renderTasks();
            renderPagination();
            alert('提交成功！');
        }
        
        init();
    </script>
</body>
</html>
