        // Supabase 配置
        const SUPABASE_URL = 'https://vejicltqodkdjchqlrqx.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZlamljbHRxb2RkZGpjaHFscnF4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwOTcxMDgsImV4cCI6MjA4OTY3MzEwOH0.uNeQttyjwZTjVhicd0oftdgWIkvdqFrtXLaCe9mjrJE';
        
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        // 🚀 真正的 Supabase OAuth 2.0 登录
        async function login() {
            console.log("启动 Supabase 推特授权...");
            
            try {
                // 清除旧残留
                localStorage.removeItem('twitter_user');
                localStorage.removeItem('done_tasks');
                localStorage.removeItem('user_tasks');
                
                // 呼叫 Supabase 官方接口去对接推特
                const { data, error } = await supabase.auth.signInWithOAuth({
                    provider: 'twitter',
                    options: {
                        redirectTo: window.location.origin
                    }
                });
                
                if (error) {
                    console.log("OAuth error:", error);
                    // 备用：让用户输入用户名
                    const username = prompt('Supabase登录失败，请输入Twitter用户名:');
                    if (username) loginWithUsername(username);
                }
            } catch (e) {
                console.log("Login error:", e);
                const username = prompt('登录出错，请输入Twitter用户名:');
                if (username) loginWithUsername(username);
            }
        }
        
        // 备用：用户名登录
        async function loginWithUsername(username) {
            // 清除旧数据
            localStorage.removeItem('twitter_user');
            localStorage.removeItem('done_tasks');
            localStorage.removeItem('user_tasks');
            
            username = username.trim().replace('@', '');
            
            let avatar = '';
            let name = username;
            
            // 尝试从 Nitter 获取真实头像
            try {
                const response = await fetch('https://nitter.net/' + username, { mode: 'cors' });
                if (response.ok) {
                    const html = await response.text();
                    // 提取头像
                    const avatarMatch = html.match(/profile-popup__avatar[^>]*src="([^"]+)"/);
                    if (avatarMatch && avatarMatch[1]) {
                        avatar = avatarMatch[1].replace('_normal', '').split('?')[0];
                        console.log('Got avatar:', avatar);
                    }
                    // 提取名字
                    const nameMatch = html.match(/<a[^>]+class="profile-name"[^>]*>([^<]+)<\/a>/);
                    if (nameMatch && nameMatch[1]) {
                        name = nameMatch[1].trim();
                    }
                }
            } catch(e) {
                console.log('Nitter failed, using fallback');
            }
            
            currentUser = {
                username: username,
                name: name,
                avatar: avatar || 'https://api.dicebear.com/7.x/avataaars/svg?seed=' + username,
                links: 0,
                interactions: 0
            };
            localStorage.setItem('twitter_user', JSON.stringify(currentUser));
            showLoggedIn();
        }
        
        // 🚀 监听 auth 状态变化
        supabase.auth.onAuthStateChange((event, session) => {
            console.log('【SUPABASE】Auth event:', event);
            console.log('【SUPABASE】Session:', session);
            
            if (event === 'SIGNED_IN' && session) {
                // 从 Supabase session 提取 Twitter 真实信息
                const user = session.user;
                const metadata = user.user_metadata;
                
                console.log('【SUPABASE】User metadata:', metadata);
                
                // 提取头像和昵称
                let avatar = metadata.avatar_url || '';
                let username = metadata.preferred_username || metadata.full_name || user.email;
                
                // 处理高清头像
                avatar = avatar.replace('_normal', '');
                
                console.log('【SUPABASE】Got user:', { username, avatar });
                
                // 更新 currentUser
                currentUser = {
                    username: username,
                    name: username,
                    avatar: avatar || 'https://api.dicebear.com/7.x/avataaars/svg?seed=' + username,
                    links: 0,
                    interactions: 0
                };
                
                localStorage.setItem('twitter_user', JSON.stringify(currentUser));
                showLoggedIn();
            }
        });
        
        // 检查当前登录状态
        async function checkAuth() {
            const { data: { session } } = await supabase.auth.getSession();
            if (session) {
                const user = session.user;
                const metadata = user.user_metadata;
                let avatar = (metadata.avatar_url || '').replace('_normal', '');
                let username = metadata.preferred_username || metadata.full_name || user.email;
                
                currentUser = {
                    username: username,
                    name: username,
                    avatar: avatar || 'https://api.dicebear.com/7.x/avataaars/svg?seed=' + username,
                    links: 0,
                    interactions: 0
                };
                showLoggedIn();
            }
        }
    </script>

    <script>
        let currentUser = { username: 'guest', avatar: 'https://api.dicebear.com/7.x/avataaars/svg?seed=guest', links: 0, interactions: 0, score: 0 };
        let userProgress = { interactions_done: 0, required: 3, is_unlocked: false };
        let allTasks = [];
        let currentPage = 1;
        const TASKS_PER_PAGE = 20;
        
        // 🚀 真正的推特登录引擎
        async function login() {
            console.log("🚀 调起推特登录模块...");
            const { error } = await supabase.auth.signInWithOAuth({
                provider: 'twitter',
                options: { redirectTo: window.location.origin }
            });
            if (error) alert("网络拦截: " + error.message);
        }

        // 🚀 安全断开引擎
        async function logout() {
            await supabase.auth.signOut();
            window.location.reload();
        }

        // 🚀 身份验资
        async function checkAuth() {
            const { data: { session } } = await supabase.auth.getSession();
            
            if (session) {
                const meta = session.user.user_metadata;
                const avatar = (meta.avatar_url || '').replace('_normal', '');
                const username = meta.preferred_username || meta.name || 'Hacker';
                
                const savedUser = JSON.parse(localStorage.getItem('user_data_' + username) || '{}');
                currentUser = {
                    username: username,
                    avatar: avatar,
                    links: savedUser.links || 0,
                    interactions: savedUser.interactions || 0,
                    score: savedUser.score || 0
                };

                document.getElementById('userInfo').innerHTML = `
                    <div class="flex items-center gap-3 fade-in">
                        <img src="${avatar}" class="w-10 h-10 rounded-full border-2 border-[#1DA1F2] glow">
                        <div class="flex flex-col">
                            <span class="text-white font-medium">@${username}</span>
                            <span class="text-xs text-[#1DA1F2]">已连接矩阵</span>
                        </div>
                        <button onclick="logout()" class="ml-3 px-3 py-1.5 bg-red-500/10 text-red-400 hover:bg-red-500/20 rounded-lg text-xs transition-all">断开连接</button>
                    </div>`;
                
                document.getElementById('mainContent').classList.remove('hidden');
                loadTasks();
                loadLeaderboard();
            } else {
                document.getElementById('mainContent').classList.add('hidden');
                loadLeaderboard(); 
            }
        }

        checkAuth();

        function updateCountdown() {
            const now = new Date();
            const midnight = new Date(now);
            midnight.setHours(24, 0, 0, 0);
            const seconds = Math.floor((midnight - now) / 1000);
            
            const lastDate = localStorage.getItem('last_reset_date');
            const today = now.toDateString();
            if (lastDate !== today && seconds < 3600) {
                localStorage.setItem('done_tasks', '[]');
                localStorage.setItem('user_tasks', '[]');
                localStorage.setItem('last_reset_date', today);
                if(currentUser) {
                    userProgress.interactions_done = 0;
                    currentUser.interactions = 0;
                }
                location.reload();
                return;
            }
            
            const h = Math.floor(seconds / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            const s = seconds % 60;
            const timerEl = document.getElementById('timer');
            if(timerEl) timerEl.textContent = String(h).padStart(2,'0') + ':' + String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
        }
        setInterval(updateCountdown, 1000);
        updateCountdown();
        updateCountdown();
        
        function init() {

            const twitterName = params.get('twitter_name');

            console.log("【MATRIX DIAGNOSTIC】URL params:", { twitterUser, twitterName, twitterAvatar });
            
            if (twitterUser) {

                currentUser = {
                    username: twitterUser,
                    name: twitterName || twitterUser,
                    avatar: avatarUrl,
                    links: 0,
                    interactions: 0,
                    score: 0
                };
                
                console.log("【MATRIX DIAGNOSTIC】Setting user from Twitter:", currentUser);
                
                // Save to localStorage
                localStorage.setItem('twitter_user', JSON.stringify(currentUser));
                // Clean URL
                window.history.replaceState({}, document.title, '/');
            } else {
                // Check localStorage
                const saved = localStorage.getItem('twitter_user');
                if (saved) {
                    try {
                        currentUser = JSON.parse(saved);
                        console.log("【MATRIX DIAGNOSTIC】Loaded from localStorage:", currentUser);
                    } catch(e) {
                        console.log("【MATRIX DIAGNOSTIC】localStorage parse error:", e);
                    }
                }
            }
            
            console.log("【MATRIX DIAGNOSTIC】Final currentUser:", currentUser);
            
            // 加载用户数据（按用户）
            const userKey = currentUser.username;
            const doneKey = 'done_tasks_' + userKey;
            const doneTasks = JSON.parse(localStorage.getItem(doneKey) || '[]');
            console.log('Loaded done tasks:', doneTasks);
            userProgress.interactions_done = doneTasks.length;
            
            // 加载用户提交数

            if (saved) {
                const userData = JSON.parse(saved);
                currentUser.links = userData.links || 0;
            }
            
            showLoggedIn();
        }

        async function loginWithUsername() {
            // 清除旧数据
            localStorage.removeItem('twitter_user');
            localStorage.removeItem('done_tasks');
            localStorage.removeItem('user_tasks');
            
            const username = document.getElementById('twitterInput').value.trim().replace('@', '');
            if (!username) {
                alert('请输入Twitter用户名');
                return;
            }
            
            // Try to get real avatar from Twitter
            try {
                // Use vxtwitter to get profile image
                const response = await fetch('https://api.vxtwitter.com/user/' + username);
                if (response.ok) {
                    const data = await response.json();
                    currentUser = {
                        username: data.user?.screen_name || username,
                        name: data.user?.name || username,
                        avatar: data.user?.profile_image_url?.replace('_normal', '') || 'https://api.dicebear.com/7.x/avataaars/svg?seed=' + username,
                        links: 0,
                        interactions: 0
                    };
                } else {
                    throw new Error('not found');
                }
            } catch (e) {
                // Fallback to dicebear
                currentUser = {
                    username: username,
                    name: username,
                    avatar: 'https://api.dicebear.com/7.x/avataaars/svg?seed=' + username,
                    links: 0,
                    interactions: 0

            localStorage.setItem('twitter_user', JSON.stringify(currentUser));

            if (savedUser && currentUser.username === 'guest') {

                userInfo.innerHTML = `
                    <div class="flex items-center gap-3">
                        <img id="avatar-img" src="${avatar}" alt="头像" class="w-10 h-10 rounded-full border-2 border-indigo-500">
                        <div class="flex flex-col">
                            <span id="username-text" class="text-white font-medium">@${name}</span>
                            <span class="text-xs text-slate-400">${currentUser.username}</span>
                        </div>
                        <button onclick="logout()" class="ml-2 text-xs text-slate-500 hover:text-white">退出</button>
                    </div>`;
                console.log('User info updated, avatar:', avatar);
            } else {
                console.log('userInfo element not found!');
            }
            document.getElementById('mainContent').classList.remove('hidden');
            document.getElementById('linksSubmitted').textContent = allTasks.length;
            document.getElementById('interactionsDone').textContent = currentUser.interactions;
            loadTasks();
            loadLeaderboard();
        }
        
        async function loadTasks() {
            // 按用户加载已完成的任务和用户提交
            const userKey = currentUser.username;
            const doneKey = 'done_tasks_' + userKey;
            const tasksKey = 'user_tasks_' + userKey;
            const doneTasks = JSON.parse(localStorage.getItem(doneKey) || '[]');
            const savedTasks = JSON.parse(localStorage.getItem(tasksKey) || '[]');
            
            // 如果有本地任务数据，直接使用
            if (savedTasks.length > 0) {
                allTasks = savedTasks;
            } else {
                // 否则从 API 加载
                try {
                    const res = await fetch('/api/tasks');
                    allTasks = await res.json();
                } catch (e) {
                    allTasks = [];
                    for (let i = 1; i <= 50; i++) {
                        allTasks.push({id: i, username: 'user_' + i, avatar: 'https://api.dicebear.com/7.x/avataaars/svg?seed=' + i, link: '#', liked: false, retweeted: false, commented: false});
                    }
                }
            }
            
            // 标记已完成的任务
            allTasks.forEach(task => {
                if (doneTasks.includes(task.id)) {
                    task.liked = task.retweeted = task.commented = true;
                }
            });
            
            // 更新进度条
            userProgress.interactions_done = doneTasks.length;
            document.getElementById('interactionsDone').textContent = doneTasks.length;
            document.getElementById('pendingNeeded').textContent = Math.max(0, userProgress.required - doneTasks.length);
            const percent = Math.min(100, (doneTasks.length / userProgress.required) * 100);
            document.getElementById('progressBar').style.width = percent + '%';
            document.getElementById('progressText').textContent = doneTasks.length + '/' + userProgress.required;
            
            if (doneTasks.length >= userProgress.required) {
                userProgress.is_unlocked = true;
                document.getElementById('linkInput').disabled = false;
                document.getElementById('submitBtn').disabled = false;
                document.getElementById('submitBtn').classList.remove('bg-white/5', 'text-slate-400', 'cursor-not-allowed');
                document.getElementById('submitBtn').classList.add('bg-indigo-500', 'text-white', 'btn-glow');
            }
            
            currentPage = 1;
            // 显示任务池总数
            document.getElementById('linksSubmitted').textContent = allTasks.length;
            renderTasks();
            renderPagination();
        }
        
        function renderTasks() {
            const start = (currentPage - 1) * TASKS_PER_PAGE;
            const tasks = allTasks.slice(start, start + TASKS_PER_PAGE);
            const list = document.getElementById('taskList');
            document.getElementById('taskCount');
            list.innerHTML = tasks.map(task => {
                const isDone = task.liked && task.retweeted && task.commented;
                return '<div class="card rounded-xl p-3 flex items-center justify-between fade-in"><div class="flex items-center gap-3"><img src="' + task.avatar + '" class="w-8 h-8 rounded-full"><a href="' + task.link + '" target="_blank" class="text-sm text-white hover:text-indigo-400">@' + task.username + '</a></div><a href="' + task.link + '" target="_blank" onclick="setTimeout(() => markAsDone(' + task.id + '), 1500)" class="px-4 py-1.5 rounded-lg text-xs font-medium ' + (isDone ? 'bg-white/5 text-slate-500' : 'bg-indigo-500/20 text-indigo-400 border border-indigo-500/30') + '">' + (isDone ? '✓ 已完成' : '去互动') + '</a></div>';
            }).join('');
        }
        
        function renderPagination() {
            const total = Math.ceil(allTasks.length / TASKS_PER_PAGE);
            const p = document.getElementById('pagination');
            if (total <= 1) { p.innerHTML = ''; return; }
            let html = '';
            
            // 上一页
            html += '<button onclick="goToPage(' + (currentPage - 1) + ')" ' + (currentPage === 1 ? 'disabled' : '') + ' class="w-8 h-8 rounded-lg text-xs ' + (currentPage === 1 ? 'opacity-30 cursor-not-allowed' : 'bg-white/5 text-slate-400 hover:bg-white/10') + '">‹</button>';
            
            for (let i = 1; i <= total; i++) {
                html += '<button onclick="goToPage(' + i + ')" class="w-8 h-8 rounded-lg text-xs ' + (i === currentPage ? 'bg-indigo-500 text-white' : 'bg-white/5 text-slate-400 hover:bg-white/10') + '">' + i + '</button>';
            }
            
            // 下一页
            html += '<button onclick="goToPage(' + (currentPage + 1) + ')" ' + (currentPage === total ? 'disabled' : '') + ' class="w-8 h-8 rounded-lg text-xs ' + (currentPage === total ? 'opacity-30 cursor-not-allowed' : 'bg-white/5 text-slate-400 hover:bg-white/10') + '">›</button>';
            
            p.innerHTML = html;
        }
        
        function goToPage(page) { 
            const total = Math.ceil(allTasks.length / TASKS_PER_PAGE);
            if (page < 1 || page > total) return;
            currentPage = page; 
            renderTasks(); 
            renderPagination(); 
        }
        
        async function loadLeaderboard() {
            // 从 localStorage 加载排行榜
            let users = JSON.parse(localStorage.getItem('leaderboard') || '[]');
            
            // 如果没有数据，显示空数据提示
            if (users.length === 0) {
                // 显示前10名空位
                users = [];
            }
            
            // 添加当前用户
            if (currentUser.username !== 'guest') {
                const idx = users.findIndex(u => u.username === currentUser.username);
                const userData = {
                    username: currentUser.username,
                    avatar: currentUser.avatar,
                    score: currentUser.score || 0
                };
                if (idx >= 0) {
                    // 如果已存在，取最高分
                    users[idx].score = Math.max(users[idx].score, userData.score);
                } else {
                    users.push(userData);
                }
            }
            
            // 排序取前10
            users.sort((a, b) => (b.score || 0) - (a.score || 0));
            users = users.slice(0, 10);
            
            renderLeaderboard(users);
        }
        
        function updateLeaderboard() {
            // 更新当前用户积分
            const leaderboard = JSON.parse(localStorage.getItem('leaderboard') || '[]');
            const idx = leaderboard.findIndex(u => u.username === currentUser.username);
            // 直接使用当前用户积分（会累加）
            const userData = {
                username: currentUser.username,
                avatar: currentUser.avatar,
                score: currentUser.score || 0
            };
            if (idx >= 0) {
                leaderboard[idx] = userData;
            } else {
                leaderboard.push(userData);
            }
            leaderboard.sort((a, b) => b.score - a.score);
            leaderboard.splice(10);
            localStorage.setItem('leaderboard', JSON.stringify(leaderboard));
            loadLeaderboard();
        }
        
        function renderLeaderboard(users) {
            const medals = ['🥇', '🥈', '🥉'];
            document.getElementById('leaderboardList').innerHTML = users.map((u, i) => 
                '<div class="card rounded-lg p-3 flex items-center"><span class="w-6 ' + (i < 3 ? 'text-yellow-400' : 'text-slate-500') + '">' + (i < 3 ? medals[i] : i+1) + '</span><img src="' + (u.avatar || u.avatar_url) + '" class="w-6 h-6 rounded-full mx-3"><span class="flex-1 text-sm text-white">@' + u.username + '</span><span class="text-xs text-purple-400 font-bold">' + (u.score || 0) + ' 分</span></div>'
            ).join('');
        }
        
        function markAsDone(taskId) {
            const task = allTasks.find(t => t.id === taskId);
            if (task) {
                task.liked = task.retweeted = task.commented = true;
                renderTasks();
                if (userProgress.interactions_done < userProgress.required) {
                    userProgress.interactions_done++;
                    currentUser.interactions = (currentUser.interactions || 0) + 1;
                }
                document.getElementById('interactionsDone').textContent = userProgress.interactions_done;
                document.getElementById('pendingNeeded').textContent = Math.max(0, userProgress.required - userProgress.interactions_done);
                const percent = Math.min(100, (userProgress.interactions_done / userProgress.required) * 100);
                document.getElementById('progressBar').style.width = percent + '%';
                document.getElementById('progressText').textContent = userProgress.interactions_done + '/' + userProgress.required;
                
                // 播放提示音
                try {
                    const audio = new Audio('https://www.soundjay.com/buttons/sounds/button-3.mp3');
                    audio.volume = 0.3;
                    audio.play();
                } catch(e) {}
                
                // 保存到 localStorage（按用户）
                const userKey = currentUser.username;
                const doneKey = 'done_tasks_' + userKey;
                const doneTasks = JSON.parse(localStorage.getItem(doneKey) || '[]');
                if (!doneTasks.includes(taskId)) {
                    doneTasks.push(taskId);
                    localStorage.setItem(doneKey, JSON.stringify(doneTasks));
                }
                
                // 更新积分 +150
                currentUser.score = (currentUser.score || 0) + 150;
                localStorage.setItem('twitter_user', JSON.stringify(currentUser));
                
                // 保存历史记录
                const historyKey = 'history_' + currentUser.username;
                const history = JSON.parse(localStorage.getItem(historyKey) || '[]');
                history.push({ type: '互动', score: 150, time: Date.now() });
                localStorage.setItem(historyKey, JSON.stringify(history.slice(-50)));
                
                updateLeaderboard();
                
                // 保存到 Supabase
                fetch('/api/interact', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        username: currentUser.username,
                        task_id: taskId
                    })
                });
                
                if (userProgress.interactions_done >= userProgress.required) {
                    userProgress.is_unlocked = true;
                    document.getElementById('linkInput').disabled = false;
                    document.getElementById('linkInput').placeholder = '粘贴你的Twitter链接...';
                    document.getElementById('submitBtn').disabled = false;
                    document.getElementById('submitBtn').classList.remove('bg-white/5', 'text-slate-400', 'cursor-not-allowed');
                    document.getElementById('submitBtn').classList.add('bg-indigo-500', 'text-white', 'btn-glow');
                    document.getElementById('unlockMessage').classList.remove('hidden');
                    document.getElementById('progressHint').textContent = '✓ 已解锁提交功能';
                }
            }
        }
        
        function submitLink() {
            const link = document.getElementById('linkInput').value;
            if (!link) { alert('请输入链接'); return; }
            const already = allTasks.some(t => t.username === currentUser.username);
            if (already) { alert('今日已提交'); return; }
            
            allTasks.unshift({id: allTasks.length + 1, username: currentUser.username, avatar: currentUser.avatar, link: link, liked: false, retweeted: false, commented: false});
            // 保存到 localStorage（按用户）
            const tasksKey = 'user_tasks_' + currentUser.username;
            localStorage.setItem(tasksKey, JSON.stringify(allTasks));
            document.getElementById('linksSubmitted').textContent = allTasks.length;
            document.getElementById('linkInput').value = '';
            
            // 扣除积分 1000
            currentUser.score = (currentUser.score || 0) - 1000;
            localStorage.setItem('twitter_user', JSON.stringify(currentUser));
            updateLeaderboard();
            
            renderTasks();
            renderPagination();
            alert('提交成功！');
        }
        
        init();
    </script>
</body>
</html>
